<style>
.w-activity-feed .feed-list{display:flex;flex-direction:column;gap:6px}
.w-activity-feed .feed-item{display:grid;grid-template-columns:auto 1fr auto;gap:6px;padding:8px 10px;background:var(--bg-inset);border:1px solid var(--rule);border-radius:4px;font-family:var(--font-mono);font-size:0.62rem;align-items:center;transition:border-color 0.15s}
.w-activity-feed .feed-item:first-child{border-color:color-mix(in srgb,var(--c-primary) 30%,var(--rule))}
.w-activity-feed .feed-item:hover{border-color:var(--c-primary)}
.w-activity-feed .fi-type{display:inline-block;padding:2px 6px;border-radius:3px;font-size:0.52rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;min-width:42px;text-align:center}
.w-activity-feed .fi-agent{background:rgba(var(--rgb-primary,245,158,11),0.15);color:var(--c-primary)}
.w-activity-feed .fi-tool{background:rgba(var(--rgb-secondary,34,197,94),0.15);color:var(--c-secondary)}
.w-activity-feed .fi-chat{background:rgba(var(--rgb-tertiary,6,182,212),0.15);color:var(--c-tertiary)}
.w-activity-feed .fi-body{min-width:0;overflow:hidden}
.w-activity-feed .fi-session{font-size:0.58rem;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.w-activity-feed .fi-detail{font-size:0.52rem;color:var(--text-dim);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
.w-activity-feed .fi-detail .fi-tools{display:flex;gap:2px;flex-wrap:wrap}
.w-activity-feed .fi-detail .fi-tool-tag{padding:0 4px;background:var(--bg-panel);border:1px solid var(--rule);border-radius:2px;font-size:0.48rem}
.w-activity-feed .fi-proj{padding:0 5px;background:var(--bg-panel);border:1px solid var(--rule);border-radius:2px;font-size:0.5rem;color:var(--c-secondary);font-family:var(--font-mono)}
.w-activity-feed .fi-right{text-align:right;white-space:nowrap}
.w-activity-feed .fi-cost{font-weight:600;color:var(--c-primary);font-size:0.7rem}
.w-activity-feed .fi-time{font-size:0.5rem;color:var(--text-dim);margin-top:2px}
.w-activity-feed .feed-empty{text-align:center;color:var(--text-dim);padding:16px;font-size:0.68rem;font-style:italic}
</style>
<script>
Periscope.registerWidget({
  id: 'last-turn',
  title: 'Recent Activity',
  size: 'sm',
  priority: 12,
  init(el) {
    el.innerHTML =
      '<div class="widget-title">Recent Activity</div>' +
      '<div class="w-activity-feed">' +
        '<div class="feed-list" id="af-list"><div class="feed-empty">Waiting for data...</div></div>' +
      '</div>';
  },
  render(el, data) {
    var sidecars = data.sidecars || [];
    if (sidecars.length === 0) return;

    // Collect last turn from each session, sorted by recency
    var items = [];
    for (var i = 0; i < sidecars.length; i++) {
      var sc = sidecars[i];
      var lt = sc.data && sc.data.lastTurn;
      if (!lt) continue;
      items.push({
        sid: sc.id,
        type: lt.type || 'unknown',
        cost: lt.cost || 0,
        model: (lt.model || '').replace(/^claude-/,'').replace(/-20\d{6}$/,''),
        tools: lt.tools || [],
        input: lt.input || 0,
        output: lt.output || 0,
        updatedAt: sc.updated_at || ''
      });
    }

    // Sort by updated_at descending (most recent first)
    items.sort(function(a, b) {
      if (a.updatedAt > b.updatedAt) return -1;
      if (a.updatedAt < b.updatedAt) return 1;
      return 0;
    });

    var list = el.querySelector('#af-list');
    var top5 = items.slice(0, 5);

    if (top5.length === 0) {
      list.innerHTML = '<div class="feed-empty">No turn data yet</div>';
      return;
    }

    var now = Date.now();
    var fmtC = function(v) { return v >= 1 ? '$' + v.toFixed(2) : '$' + v.toFixed(3); };
    var fmtAgo = function(ts) {
      if (!ts) return '';
      var diff = now - new Date(ts).getTime();
      if (diff < 60000) return 'just now';
      if (diff < 3600000) return Math.round(diff / 60000) + 'm ago';
      if (diff < 86400000) return Math.round(diff / 3600000) + 'h ago';
      return Math.round(diff / 86400000) + 'd ago';
    };

    var esc = typeof escHtml === 'function' ? escHtml : function(s){return s||''};
    list.innerHTML = top5.map(function(item) {
      var typeClass = item.type === 'agent' ? 'fi-agent' : item.type === 'tool' ? 'fi-tool' : 'fi-chat';
      var label = sessionLabel(item.sid, data);
      var proj = (typeof sessionProject === 'function') ? sessionProject(item.sid, data) : '';
      var projTag = proj ? '<span class="fi-proj">' + esc(proj) + '</span>' : '';
      var toolTags = item.tools.length > 0
        ? '<span class="fi-tools">' + item.tools.slice(0,3).map(function(t) { return '<span class="fi-tool-tag">' + esc(t) + '</span>'; }).join('') + (item.tools.length > 3 ? '<span class="fi-tool-tag">+' + (item.tools.length - 3) + '</span>' : '') + '</span>'
        : '';
      return '<div class="feed-item">' +
        '<span class="fi-type ' + typeClass + '">' + esc(item.type) + '</span>' +
        '<div class="fi-body">' +
          '<div class="fi-session" title="' + esc(item.sid) + '">' + esc(label) + '</div>' +
          '<div class="fi-detail">' +
            projTag +
            '<span>' + esc(item.model) + '</span>' +
            toolTags +
          '</div>' +
        '</div>' +
        '<div class="fi-right">' +
          '<div class="fi-cost">' + fmtC(item.cost) + '</div>' +
          '<div class="fi-time">' + fmtAgo(item.updatedAt) + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }
});
</script>
