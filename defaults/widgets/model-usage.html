<style>
.w-models .model-grid{display:flex;flex-direction:column;gap:6px}
.w-models .model-row{display:grid;grid-template-columns:100px 1fr 80px 60px;gap:8px;align-items:center;padding:8px 10px;background:var(--bg-inset);border-radius:4px;border:1px solid var(--rule)}
.w-models .model-name{font-size:0.72rem;font-weight:600;font-family:var(--font-mono);color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.w-models .model-bar-wrap{height:6px;background:var(--bg-void);border-radius:3px;overflow:hidden}
.w-models .model-bar{height:100%;border-radius:3px;transition:width 0.5s ease}
.w-models .model-tokens{font-size:0.65rem;font-family:var(--font-mono);color:var(--text);text-align:right;font-weight:500}
.w-models .model-pct{font-size:0.6rem;font-family:var(--font-mono);color:var(--text-dim);text-align:right}
.w-models .model-detail{display:flex;gap:12px;font-size:0.58rem;color:var(--text-dim);font-family:var(--font-mono);padding-left:110px;margin-top:-2px}
.w-models .model-detail span{white-space:nowrap}
.w-models .model-cost{color:var(--c-primary);font-weight:500}
.w-models .empty{text-align:center;color:var(--text-dim);padding:20px;font-style:italic;font-family:var(--font-ui);font-size:0.72rem}
</style>
<script>
Periscope.registerWidget({
  id: 'model-usage',
  title: 'Model Usage',
  size: 'md',
  priority: 25,

  init(el) {
    el.innerHTML = '<div class="widget-title">Model Usage</div><div class="w-models"><div class="model-grid" id="mu-grid"></div></div>';
  },

  render(el, data) {
    var grid = el.querySelector('#mu-grid');
    var sidecars = data.sidecars || [];

    // Aggregate across all sessions: tokens, cost, turns by model
    var models = {};
    sidecars.forEach(function(s) {
      var c = s.data && s.data.cumulative;
      if (!c) return;
      var modelsMap = s.data.models || {};
      var modelKeys = Object.keys(modelsMap);

      // Only count sessions with hook-tracked model data — no guessing
      if (modelKeys.length === 0) return;

      var totalTurns = 0;
      modelKeys.forEach(function(m) { totalTurns += modelsMap[m]; });
      if (totalTurns === 0) return;

      modelKeys.forEach(function(m) {
        var frac = modelsMap[m] / totalTurns;
        if (!models[m]) models[m] = { tokens: 0, cost: 0, turns: 0, sessions: 0, input: 0, output: 0, cr: 0, cw: 0 };
        models[m].tokens += Math.round((c.input + c.cache_read + c.cache_write + c.output) * frac);
        models[m].cost += (c.cost || 0) * frac;
        models[m].turns += modelsMap[m];
        models[m].input += Math.round((c.input || 0) * frac);
        models[m].output += Math.round((c.output || 0) * frac);
        models[m].cr += Math.round((c.cache_read || 0) * frac);
        models[m].cw += Math.round((c.cache_write || 0) * frac);
        models[m].sessions++;
      });
    });

    var entries = Object.entries(models).sort(function(a, b) { return b[1].tokens - a[1].tokens; });

    if (entries.length === 0) {
      grid.innerHTML = '';
      return;
    }

    var maxTok = entries[0][1].tokens || 1;

    var cs = getComputedStyle(document.documentElement);
    var palette = [
      cs.getPropertyValue('--c-primary').trim() || '#E06236',
      cs.getPropertyValue('--c-tertiary').trim() || '#2F4C79',
      cs.getPropertyValue('--c-accent').trim() || '#8B5CF6',
      cs.getPropertyValue('--c-secondary').trim() || '#D7AB61',
      cs.getPropertyValue('--c-danger').trim() || '#C82337'
    ];

    var fmtK = function(n) { return n >= 1e9 ? (n/1e9).toFixed(1)+'B' : n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'K' : n.toString(); };
    var fmtCost = function(v) { return v >= 10 ? '$'+v.toFixed(0) : v >= 1 ? '$'+v.toFixed(1) : '$'+v.toFixed(2); };
    var totalTok = entries.reduce(function(s, e) { return s + e[1].tokens; }, 0);

    var html = '';
    entries.forEach(function(entry, i) {
      var name = entry[0];
      var d = entry[1];
      var pct = totalTok > 0 ? Math.round(d.tokens / totalTok * 100) : 0;
      var barPct = Math.round(d.tokens / maxTok * 100);
      var color = palette[i % palette.length];

      html += '<div class="model-row">' +
        '<div class="model-name" title="' + name + '">' + name + '</div>' +
        '<div class="model-bar-wrap"><div class="model-bar" style="width:' + barPct + '%;background:' + color + '"></div></div>' +
        '<div class="model-tokens">' + fmtK(d.tokens) + '</div>' +
        '<div class="model-pct">' + pct + '%</div>' +
        '</div>' +
        '<div class="model-detail">' +
          '<span class="model-cost">' + fmtCost(d.cost) + '</span>' +
          '<span>' + d.turns + ' turns</span>' +
          '<span>' + d.sessions + ' session' + (d.sessions !== 1 ? 's' : '') + '</span>' +
          '<span>in:' + fmtK(d.input) + ' out:' + fmtK(d.output) + '</span>' +
        '</div>';
    });

    grid.innerHTML = html;
  }
});
</script>
