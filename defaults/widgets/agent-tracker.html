<style>
/* Agent Tracker Widget */
.w-agents{display:flex;flex-direction:column;height:100%;min-height:0}
.w-agents .controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.w-agents .count{font-size:0.65rem;color:var(--text-dim);font-family:var(--font-mono)}
.w-agents .teams-wrap{flex:1;min-height:0;overflow-y:auto}

.w-agents .team-row{border:1px solid var(--rule);border-radius:6px;margin-bottom:6px;overflow:hidden;transition:border-color 0.15s}
.w-agents .team-row:hover{border-color:color-mix(in srgb,var(--rule) 50%,var(--text-dim))}

.w-agents .team-header{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;cursor:pointer;user-select:none;background:var(--bg-inset);transition:background 0.1s}
.w-agents .team-header:hover{background:var(--bg-hover)}
.w-agents .team-chevron{font-size:0.6rem;color:var(--text-dim);margin-right:6px;transition:transform 0.2s;display:inline-block}
.w-agents .team-row.expanded .team-chevron{transform:rotate(90deg)}
.w-agents .team-name{font-family:var(--font-mono);font-size:0.75rem;font-weight:600;color:var(--text)}
.w-agents .team-stats{font-family:var(--font-mono);font-size:0.65rem;color:var(--text-dim);display:flex;gap:8px;align-items:center}
.w-agents .team-cost{color:var(--c-primary);font-weight:500}
.w-agents .team-members-count{font-size:0.58rem}

.w-agents .members-list{display:none;border-top:1px solid var(--rule)}
.w-agents .team-row.expanded .members-list{display:block}

.w-agents .member-row{display:flex;justify-content:space-between;align-items:center;padding:5px 12px 5px 24px;font-family:var(--font-mono);font-size:0.65rem;border-bottom:1px solid var(--rule);transition:background 0.1s}
.w-agents .member-row:last-child{border-bottom:none}
.w-agents .member-row:hover{background:var(--bg-hover)}

.w-agents .member-left{display:flex;align-items:center;gap:6px;min-width:0}
.w-agents .member-tree{color:var(--text-dim);flex-shrink:0}
.w-agents .member-name{font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.w-agents .member-model{font-size:0.58rem;color:var(--text-dim)}

.w-agents .member-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.w-agents .member-cost{color:var(--c-primary);font-weight:500}

.w-agents .badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:0.5rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.w-agents .badge-lead{background:rgba(var(--rgb-primary,245,158,11),0.15);color:var(--c-primary)}
.w-agents .badge-active{background:rgba(var(--rgb-secondary,34,197,94),0.15);color:var(--c-secondary,#22c55e)}
.w-agents .badge-idle{background:rgba(255,255,255,0.06);color:var(--text-dim)}
.w-agents .badge-unknown{background:rgba(255,255,255,0.04);color:var(--text-dim);font-style:italic}

.w-agents .empty-state{text-align:center;color:var(--text-dim);padding:24px;font-style:italic;font-family:var(--font-ui);font-size:0.72rem}
.w-agents .empty-sub{font-size:0.6rem;margin-top:6px;opacity:0.6}

@media (max-width: 640px) {
  .w-agents .member-model{display:none}
}
</style>
<script>
Periscope.registerWidget({
  id: 'agent-tracker',
  title: 'Agent Tracker',
  size: 'lg',
  priority: 45,

  init(el) {
    el.innerHTML = `
      <div class="w-agents">
        <div class="controls">
          <div class="widget-title" style="margin:0">Agent Tracker</div>
          <span class="count" id="at-count"></span>
        </div>
        <div class="teams-wrap" id="at-teams"></div>
      </div>`;
    el._atExpanded = {};
  },

  render(el, data) {
    const teams = data.teams || [];
    const wrap = el.querySelector('#at-teams');
    const countEl = el.querySelector('#at-count');

    if (teams.length === 0) {
      countEl.textContent = '';
      wrap.innerHTML = '<div class="empty-state">No active teams<div class="empty-sub">Teams appear when Claude Code spawns agent teammates</div></div>';
      return;
    }

    countEl.textContent = teams.length + ' team' + (teams.length !== 1 ? 's' : '');

    // Sort by createdAt descending
    const sorted = [...teams].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

    const fmtCost = v => v >= 10 ? '$' + v.toFixed(1) : '$' + v.toFixed(2);
    const esc = s => { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; };
    const shortModel = m => (m || '').replace(/^claude-/, '').replace(/-20\d{6}$/, '');

    let html = '';
    sorted.forEach(team => {
      const name = team.name || 'unnamed';
      const isExpanded = el._atExpanded[name] !== false; // default expanded
      const expClass = isExpanded ? ' expanded' : '';
      const members = team.members || [];
      const totalCost = team.totalCost || 0;
      const totalTurns = team.totalTurns || 0;

      html += `<div class="team-row${expClass}" data-team="${esc(name)}">`;
      html += `<div class="team-header">
        <div>
          <span class="team-chevron">\u25B6</span>
          <span class="team-name">${esc(name)}</span>
          <span class="team-members-count">${members.length} agent${members.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="team-stats">
          <span class="team-cost">${fmtCost(totalCost)}</span>
          <span>${totalTurns} turns</span>
        </div>
      </div>`;

      html += '<div class="members-list">';
      members.forEach((m, i) => {
        const isLead = i === 0 || (m.agentType || '').includes('lead');
        const isLast = i === members.length - 1;
        const tree = isLast ? '\u2514\u2500' : '\u251C\u2500';
        const model = shortModel(m.model);
        const cost = m.cost || 0;
        const status = m.status || 'unknown';

        let badge = '';
        if (isLead) badge = '<span class="badge badge-lead">lead</span>';
        else if (status === 'active') badge = '<span class="badge badge-active">active</span>';
        else if (status === 'idle') badge = '<span class="badge badge-idle">idle</span>';
        else badge = '<span class="badge badge-unknown">?</span>';

        html += `<div class="member-row">
          <div class="member-left">
            <span class="member-tree">${tree}</span>
            <span class="member-name">${esc(m.name || m.agentId)}</span>
            <span class="member-model">(${esc(model)})</span>
          </div>
          <div class="member-right">
            <span class="member-cost">${fmtCost(cost)}</span>
            ${badge}
          </div>
        </div>`;
      });
      html += '</div></div>';
    });

    wrap.innerHTML = html;

    // Bind expand/collapse
    wrap.querySelectorAll('.team-header').forEach(hdr => {
      hdr.addEventListener('click', () => {
        const row = hdr.closest('.team-row');
        const name = row.dataset.team;
        const wasExpanded = row.classList.contains('expanded');
        row.classList.toggle('expanded');
        el._atExpanded[name] = !wasExpanded;
      });
    });
  }
});
</script>
