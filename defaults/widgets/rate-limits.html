<style>
/* Rate Limit HUD — .w-rlhud namespace */
.w-rlhud{display:flex;gap:16px;align-items:stretch;background:var(--bg-inset);border:1px solid var(--rule);border-radius:12px;padding:14px 16px}
.w-rlhud:hover{border-color:color-mix(in srgb,var(--rule) 50%,var(--text-dim));box-shadow:0 0 20px var(--glow)}

/* Gauges column */
.w-rlhud .hud-gauges{display:flex;gap:14px;align-items:center;flex-shrink:0}
.w-rlhud .hud-gauge{display:flex;flex-direction:column;align-items:center;gap:3px}
.w-rlhud .hud-gauge svg{filter:drop-shadow(0 0 8px var(--glow));transition:filter 0.3s}
.w-rlhud .hud-gauge:hover svg{filter:drop-shadow(0 0 14px var(--glow))}
.w-rlhud .gauge-ring-bg{fill:none;stroke:var(--rule);stroke-width:8;opacity:0.4}
.w-rlhud .gauge-ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1),stroke 0.4s}
.w-rlhud .gauge-ring-glow{fill:none;stroke-width:12;stroke-linecap:round;opacity:0.15;transition:stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1)}
.w-rlhud .gauge-center-val{font-family:var(--font-mono);font-size:16px;font-weight:700;fill:var(--text-bright,var(--text));text-anchor:middle;dominant-baseline:central;font-variant-numeric:tabular-nums}
.w-rlhud .gauge-center-label{font-family:var(--font-ui,var(--font-mono));font-size:9px;font-weight:700;fill:var(--text-dim);text-anchor:middle;letter-spacing:1.5px;text-transform:uppercase}
.w-rlhud .hud-gauge-reset{font-family:var(--font-mono);font-size:8px;color:var(--text-dim);min-height:12px;text-align:center;line-height:1.3}
.w-rlhud .hud-gauge-reset .at-limit{color:var(--c-danger,#ef4444);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}

/* Sync area */
.w-rlhud .hud-gauge-sync{display:flex;flex-direction:column;align-items:center;gap:3px;margin-top:4px}
.w-rlhud .sync-btn{font-family:var(--font-ui,var(--font-mono));font-weight:600;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border:1px solid var(--rule);background:var(--bg-void,var(--bg-inset));color:var(--text);cursor:pointer;transition:all .15s;border-radius:4px}
.w-rlhud .sync-btn:hover{border-color:var(--c-primary);color:var(--c-primary);box-shadow:0 0 12px var(--glow)}
.w-rlhud .data-age{font-family:var(--font-mono);font-size:9px;color:var(--text-dim)}

/* Intel cards 2x3 grid */
.w-rlhud .hud-intel{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;min-width:0}
.w-rlhud .hud-intel-card{background:color-mix(in srgb,var(--bg-inset) 60%,transparent);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--rule);border-radius:8px;padding:10px 12px;transition:transform .2s,border-color .2s}
.w-rlhud .hud-intel-card:hover{transform:translateY(-2px);border-color:color-mix(in srgb,var(--rule) 50%,var(--text-dim));box-shadow:0 0 12px var(--glow)}
.w-rlhud .ic-label{font-family:var(--font-mono);font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.w-rlhud .ic-val{font-family:var(--font-ui,var(--font-mono));font-size:16px;font-weight:700;color:var(--text-bright,var(--text));line-height:1.1;font-variant-numeric:tabular-nums}
.w-rlhud .ic-sub{font-family:var(--font-mono);font-size:8px;margin-top:2px;color:var(--text-dim)}
.w-rlhud .ic-val-row{display:flex;gap:4px;align-items:baseline;flex-wrap:wrap}
.w-rlhud .ic-tag{font-size:11px;color:var(--text-dim)}
.w-rlhud .ic-timing-line{font-size:13px;line-height:1.5}
.w-rlhud .ic-status{font-size:10px;font-weight:600;margin-top:2px;letter-spacing:0.5px}

/* Penguin column */
.w-rlhud .hud-penguin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:130px;flex-shrink:0}
.w-rlhud .hud-penguin-wrap .penguin-scene{width:130px;height:120px;margin-bottom:2px}
.w-rlhud .hud-penguin-wrap .penguin-body{width:90px;height:100px}
.w-rlhud .hud-penguin-wrap .data-particle{font-size:6px}
.w-rlhud .hud-penguin-status{font-family:var(--font-mono);font-size:8px;text-align:center;letter-spacing:0.5px;margin-top:2px}
.w-rlhud .hud-penguin-status.live{color:var(--c-secondary)}
.w-rlhud .hud-penguin-status.live::after{content:'...';display:inline-block;width:1.2em;text-align:left;animation:rlhud-dots 1.5s steps(4,end) infinite}
@keyframes rlhud-dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
.w-rlhud .hud-penguin-status.error{color:var(--c-danger)}
.w-rlhud .hud-penguin-status.stale{color:var(--c-primary)}

/* Extra usage credit bar */
.w-rlhud .hud-extra{width:100%;margin-top:6px;display:none}
.w-rlhud .hud-extra.visible{display:block}
.w-rlhud .hud-extra-label{font-family:var(--font-mono);font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.w-rlhud .hud-extra-label .eu-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.w-rlhud .hud-extra-label .eu-dot.on{background:var(--signal,#22c55e);box-shadow:0 0 6px var(--signal,#22c55e)}
.w-rlhud .hud-extra-label .eu-dot.off{background:var(--text-dim);opacity:0.5}
.w-rlhud .hud-extra-bar{height:5px;background:var(--rule);border-radius:3px;overflow:hidden}
.w-rlhud .hud-extra-fill{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1),background 0.4s}
.w-rlhud .hud-extra-val{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);margin-top:2px;text-align:center}

/* Phantom burn meter */
.w-rlhud .hud-phantom{width:100%;margin-top:6px;display:none}
.w-rlhud .hud-phantom.visible{display:block}
.w-rlhud .hud-phantom-label{font-family:var(--font-mono);font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.w-rlhud .hud-phantom-label .ph-dot{width:5px;height:5px;border-radius:50%;background:#a855f7;box-shadow:0 0 6px rgba(168,85,247,0.6);flex-shrink:0}
.w-rlhud .hud-phantom-bar{height:5px;background:var(--rule);border-radius:3px;overflow:hidden;display:flex}
.w-rlhud .hud-phantom-fill-cli{height:100%;background:var(--c-primary);transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}
.w-rlhud .hud-phantom-fill-ghost{height:100%;background:#a855f7;transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}
.w-rlhud .hud-phantom-val{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);margin-top:2px;display:flex;justify-content:space-between}
.w-rlhud .hud-phantom-val .ph-cli{color:var(--c-primary)}
.w-rlhud .hud-phantom-val .ph-ghost{color:#a855f7}

/* Gauge mode toggle — instrument-style icon toggle */
.hud-mode-toggle{display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 6px;
  border:1px solid var(--rule);background:var(--bg-inset);color:var(--text-dim);cursor:pointer;
  border-radius:20px;transition:all .25s;margin-left:auto;line-height:1;font-family:var(--font-mono);
  font-size:7.5px;letter-spacing:1.5px;text-transform:uppercase}
.hud-mode-toggle svg{transition:all .3s;opacity:0.5}
.hud-mode-toggle .toggle-label{transition:color .25s}
.hud-mode-toggle:hover{border-color:var(--c-primary);box-shadow:0 0 12px rgba(var(--rgb-primary),0.12)}
.hud-mode-toggle:hover svg{opacity:0.8}
.hud-mode-toggle.active{background:rgba(var(--rgb-primary),0.08);border-color:var(--c-primary);color:var(--c-primary)}
.hud-mode-toggle.active svg{opacity:1}
.hud-mode-toggle.active .toggle-needle{animation:toggle-tick .4s cubic-bezier(0.34,1.56,0.64,1) forwards}
@keyframes toggle-tick{0%{transform:rotate(-45deg)}60%{transform:rotate(50deg)}100%{transform:rotate(35deg)}}

/* Chronomark gauge panel — each gauge column: gauge on top, stats underneath */
.w-rlhud .chrono-panel{flex:1;display:flex;gap:4px;justify-content:center;align-items:flex-start;flex-wrap:wrap;min-width:0}
.w-rlhud .chrono-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:200px;max-width:320px}
.w-rlhud .effort-col{display:flex;flex-direction:column;align-items:center;width:58px;min-width:58px;flex-shrink:0;padding-top:0}
.w-rlhud .chrono-col svg{overflow:visible;width:100%;height:auto}
.w-rlhud .chrono-substats{display:flex;gap:6px;width:100%}
.w-rlhud .cs-item{flex:1;text-align:center;padding:5px 8px;background:rgba(var(--rgb-tertiary,var(--rgb-primary)),0.03);border:1px solid rgba(var(--rgb-tertiary,var(--rgb-primary)),0.08);border-radius:var(--radius,4px)}
.w-rlhud .cs-label{font-family:var(--font-mono);font-size:7px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px}
.w-rlhud .cs-val{font-family:var(--font-ui,var(--font-mono));font-size:14px;font-weight:700;line-height:1.3;font-variant-numeric:tabular-nums}
@keyframes chrono-sweep{
  0%{transform:rotate(-60deg)}
  12%{transform:rotate(55deg)}
  35%{transform:rotate(-15deg)}
  55%{transform:rotate(25deg)}
  80%{transform:rotate(var(--target-rot))}
  100%{transform:rotate(var(--target-rot))}
}

/* Responsive */
@media(max-width:1024px){
  .w-rlhud{flex-direction:column;align-items:center}
  .w-rlhud .hud-gauges{justify-content:center}
  .w-rlhud .hud-gauges svg{width:80px;height:80px}
  .w-rlhud .hud-penguin-wrap{min-width:unset}
  .w-rlhud .gauge-center-val{font-size:13px}
}
@media(max-width:900px){
  .w-rlhud .hud-intel{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:640px){
  .w-rlhud{padding:10px;gap:12px}
  .w-rlhud .hud-gauges svg{width:70px;height:70px}
  .w-rlhud .gauge-center-val{font-size:12px}
  .w-rlhud .hud-intel{grid-template-columns:1fr}
}
@media(max-width:460px){
  .w-rlhud .hud-gauges{flex-direction:column}
}
</style>
<script>
Periscope.registerWidget({
  id: 'rate-limits',
  title: 'Rate Limit HUD',
  size: 'lg',
  priority: 1,

  init(el) {
    var CIRC = (2 * Math.PI * 48).toFixed(1);
    el.innerHTML =
      '<div class="widget-title">Rate Limit HUD</div>' +
      '<div class="w-rlhud">' +

        /* --- Gauges column --- */
        '<div style="display:flex;flex-direction:column;align-items:center;gap:6px">' +
          '<div class="hud-gauges">' +
            /* 5-Hour gauge */
            '<div class="hud-gauge" data-gauge="5hr">' +
              '<svg width="100" height="100" viewBox="0 0 120 120">' +
                '<circle class="gauge-ring-bg" cx="60" cy="60" r="48"/>' +
                '<circle class="gauge-ring-glow" cx="60" cy="60" r="48" stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + CIRC + '" transform="rotate(-90 60 60)"/>' +
                '<circle class="gauge-ring-fill" cx="60" cy="60" r="48" stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + CIRC + '" transform="rotate(-90 60 60)"/>' +
                '<text class="gauge-center-val" x="60" y="55">--%</text>' +
                '<text class="gauge-center-label" x="60" y="72">5-HOUR</text>' +
              '</svg>' +
              '<div class="hud-gauge-reset" data-reset="5hr"></div>' +
            '</div>' +
            /* Weekly gauge — center, with SYNC underneath */
            '<div class="hud-gauge" data-gauge="weekly">' +
              '<svg width="100" height="100" viewBox="0 0 120 120">' +
                '<circle class="gauge-ring-bg" cx="60" cy="60" r="48"/>' +
                '<circle class="gauge-ring-glow" cx="60" cy="60" r="48" stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + CIRC + '" transform="rotate(-90 60 60)"/>' +
                '<circle class="gauge-ring-fill" cx="60" cy="60" r="48" stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + CIRC + '" transform="rotate(-90 60 60)"/>' +
                '<text class="gauge-center-val" x="60" y="55">--%</text>' +
                '<text class="gauge-center-label" x="60" y="72">WEEKLY</text>' +
              '</svg>' +
              '<div class="hud-gauge-reset" data-reset="weekly"></div>' +
              '<div class="hud-gauge-sync">' +
                '<button class="sync-btn" data-action="sync">SYNC</button>' +
                '<span class="data-age">--</span>' +
              '</div>' +
            '</div>' +
            /* Sonnet gauge */
            '<div class="hud-gauge" data-gauge="sonnet">' +
              '<svg width="100" height="100" viewBox="0 0 120 120">' +
                '<circle class="gauge-ring-bg" cx="60" cy="60" r="48"/>' +
                '<circle class="gauge-ring-glow" cx="60" cy="60" r="48" stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + CIRC + '" transform="rotate(-90 60 60)"/>' +
                '<circle class="gauge-ring-fill" cx="60" cy="60" r="48" stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + CIRC + '" transform="rotate(-90 60 60)"/>' +
                '<text class="gauge-center-val" x="60" y="55">--%</text>' +
                '<text class="gauge-center-label" x="60" y="72">SONNET</text>' +
              '</svg>' +
              '<div class="hud-gauge-reset" data-reset="sonnet"></div>' +
            '</div>' +
          '</div>' +
          /* Extra usage credit bar — hidden until data arrives */
          '<div class="hud-extra" data-extra="wrap"></div>' +
          /* Phantom burn meter — purple, shows CLI vs phantom split */
          '<div class="hud-phantom" data-phantom="wrap"></div>' +
        '</div>' +

        /* --- Intel cards 2x3 (text mode) --- */
        '<div class="hud-intel" data-view="text">' +
          '<div class="hud-intel-card" data-card="burn"></div>' +
          '<div class="hud-intel-card" data-card="ttl"></div>' +
          '<div class="hud-intel-card" data-card="proj"></div>' +
          '<div class="hud-intel-card" data-card="window"></div>' +
          '<div class="hud-intel-card" data-card="pace"></div>' +
          '<div class="hud-intel-card" data-card="duty"></div>' +
        '</div>' +

        /* --- Chronomark gauge panel (gauge mode, hidden by default) --- */
        '<div class="chrono-panel" data-view="gauge" style="display:none">' +
          '<div class="chrono-col" data-chrono="5hr">' +
            '<div data-chrono-svg></div>' +
            '<div class="chrono-substats" data-chrono-stats></div>' +
          '</div>' +
          '<div class="effort-col" data-effort-gauge></div>' +
          '<div class="chrono-col" data-chrono="weekly">' +
            '<div data-chrono-svg></div>' +
            '<div class="chrono-substats" data-chrono-stats></div>' +
          '</div>' +
        '</div>' +

        /* --- Penguin mascot --- */
        '<div class="hud-penguin-wrap"></div>' +

      '</div>';

    // Wire SYNC button
    el.querySelector('[data-action="sync"]').addEventListener('click', function() {
      if (typeof Periscope.refreshUsage === 'function') Periscope.refreshUsage();
    });

    // Gauge mode toggle — available on all themes
    {
      var titleEl = el.querySelector('.widget-title');
      var toggleBtn = document.createElement('button');
      toggleBtn.className = 'hud-mode-toggle';
      toggleBtn.innerHTML =
        '<svg width="16" height="12" viewBox="0 0 20 14">' +
          '<path d="M 2,13 A 10,10 0 0,1 18,13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>' +
          '<line class="toggle-needle" x1="10" y1="12" x2="10" y2="4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" style="transform-origin:10px 12px;transform:rotate(-45deg)"/>' +
          '<circle cx="10" cy="12" r="1.5" fill="currentColor"/>' +
        '</svg>' +
        '<span class="toggle-label">Gauges</span>';
      titleEl.style.display = 'flex';
      titleEl.style.alignItems = 'center';
      titleEl.style.gap = '8px';
      titleEl.appendChild(toggleBtn);

      var gaugeMode = localStorage.getItem('periscope-hud-gauges') === '1';
      var textView = el.querySelector('[data-view="text"]');
      var gaugeView = el.querySelector('[data-view="gauge"]');

      var needleEl = toggleBtn.querySelector('.toggle-needle');
      function applyMode() {
        if (gaugeMode) {
          textView.style.display = 'none';
          gaugeView.style.display = '';
          toggleBtn.classList.add('active');
          needleEl.style.transform = 'rotate(35deg)';
        } else {
          textView.style.display = '';
          gaugeView.style.display = 'none';
          toggleBtn.classList.remove('active');
          needleEl.style.transform = 'rotate(-45deg)';
        }
      }
      applyMode();

      toggleBtn.addEventListener('click', function() {
        gaugeMode = !gaugeMode;
        localStorage.setItem('periscope-hud-gauges', gaugeMode ? '1' : '0');
        applyMode();
        // Force re-render with stashed data
        if (el._lastData) Periscope._widgets.get('rate-limits').render(el, el._lastData);
      });
    }
  },

  render(el, data) {
    el._lastData = data; // stash for toggle re-render
    var CIRC = 2 * Math.PI * 48;

    // --- Resolve runtime globals with safe fallbacks ---
    var tColor = typeof thresholdColor === 'function' ? thresholdColor
      : function(p) { return p < 50 ? '#22c55e' : p < 80 ? '#d7ab61' : '#c82337'; };
    var pColor = typeof projColor === 'function' ? projColor
      : function(p) { if (p >= 100) return 'var(--c-danger)'; if (p >= 80) return 'var(--c-warm)'; if (p >= 50) return 'var(--c-primary)'; return 'var(--c-secondary)'; };
    var fH = typeof fmtHrs === 'function' ? fmtHrs
      : function(h) { if (h === Infinity || h > 999) return '\u221E'; if (h < 1) return Math.round(h*60)+'m'; if (h >= 24) return (h/24).toFixed(1)+'d'; return h.toFixed(1)+'h'; };
    var pScene = typeof penguinScene === 'function' ? penguinScene : null;
    var prep = typeof prepRateLimitData === 'function' ? prepRateLimitData : null;

    // --- Ring gauge updater ---
    function setRing(key, pct, resetIso) {
      var cell = el.querySelector('[data-gauge="' + key + '"]');
      if (!cell) return;
      var fill = cell.querySelector('.gauge-ring-fill');
      var glow = cell.querySelector('.gauge-ring-glow');
      var valEl = cell.querySelector('.gauge-center-val');
      var resetEl = cell.querySelector('[data-reset="' + key + '"]');

      if (pct == null || !isFinite(pct)) {
        fill.style.strokeDashoffset = CIRC;
        fill.style.stroke = 'var(--text-dim)';
        if (glow) { glow.style.strokeDashoffset = CIRC; glow.style.stroke = 'var(--text-dim)'; }
        if (valEl) valEl.textContent = '--%';
        if (resetEl) resetEl.innerHTML = '';
        return;
      }
      var clamped = Math.min(Math.max(pct, 0), 100);
      var color = tColor(clamped);
      var offset = CIRC * (1 - clamped / 100);
      fill.style.strokeDashoffset = offset;
      fill.style.stroke = color;
      if (glow) { glow.style.strokeDashoffset = offset; glow.style.stroke = color; }
      if (valEl) valEl.textContent = Math.round(clamped) + '%';

      // Reset countdown + at-limit status
      if (resetEl) {
        var atLimit = pct >= 100;
        var resetText = '';
        if (resetIso) {
          var diffMin = Math.round((new Date(resetIso) - Date.now()) / 60000);
          if (diffMin <= 0) {
            resetText = 'resets now';
          } else if (diffMin < 60) {
            resetText = 'resets ' + diffMin + 'm';
          } else {
            var hrs = Math.floor(diffMin / 60);
            var mins = diffMin % 60;
            resetText = 'resets ' + hrs + 'h' + (mins > 0 ? mins + 'm' : '');
          }
        }
        if (atLimit) {
          resetEl.innerHTML = '<span class="at-limit">at limit</span>' + (resetText ? ' \u2014 ' + resetText : '');
        } else {
          resetEl.innerHTML = resetText;
        }
      }
    }

    // --- Data extraction ---
    var lu = data && data.liveUsage;
    var pct5 = lu && lu.pct5hr >= 0 ? lu.pct5hr : null;
    var pctW = lu && lu.pctWeekly >= 0 ? lu.pctWeekly : null;
    var pctS = lu && lu.pctSonnet >= 0 ? lu.pctSonnet : null;

    // Set ring gauges
    setRing('5hr', pct5, lu ? lu.reset5hr : null);
    setRing('weekly', pctW, lu ? lu.resetWeekly : null);
    setRing('sonnet', pctS, lu ? lu.resetSonnet : null);

    // --- Data age + signal state ---
    var ageEl = el.querySelector('.data-age');
    var isLive = lu && lu.fetched_at;
    var ageSec = isLive ? Math.round(Date.now() / 1000 - lu.fetched_at) : Infinity;
    var isStale = ageSec > 120;
    var isError = !isLive;
    if (ageEl) {
      if (isError) ageEl.textContent = 'no data';
      else if (ageSec < 60) ageEl.textContent = ageSec + 's ago';
      else ageEl.textContent = Math.round(ageSec / 60) + 'm ago';
    }

    // --- Extra Usage ---
    var extraWrap = el.querySelector('[data-extra="wrap"]');
    if (extraWrap) {
      var eu = lu && lu.extra_usage;
      if (eu) {
        extraWrap.classList.add('visible');
        var anyAtLimit = (pctW != null && pctW >= 100) || (pct5 != null && pct5 >= 100);
        if (eu.is_enabled) {
          var euUsed = eu.used_credits || 0;
          var euLimit = eu.monthly_limit;
          var burning = anyAtLimit && euUsed > 0;
          var euLabel = burning ? 'BURNING EXTRA USAGE' : 'EXTRA USAGE';
          if (euLimit != null && euLimit > 0) {
            var euPct = Math.min(100, (euUsed / euLimit) * 100);

            '<text x="'+CX+'" y="100" text-anchor="middle" font-family="Michroma,sans-serif" font-size="5" fill="rgba('+rgbSafe+',0.7)" letter-spacing="2px" font-weight="bold">'+label+'</text>' +
            // Vertical capsule gauges in dead space (disabled for now)
            // buildSideGauges(sides||[], rgbSafe, cSafe, cWarn, cDanger, hexRgb) +
          '</svg>';
        }

        // Vertical capsule gauge builder — renders in SVG dead space flanking the half-gauge
        function buildSideGauges(items, rgbSafe, cSafe, cWarn, cDanger, hexRgb) {
          if (!items || !items.length) return '';
          var s = '';
          // Position configs: outside the arc housing, well spread
          var positions = [
            {x:-17, anchor:'start'},
            {x:217, anchor:'end'}
          ];
          var BY=34, BH=68, BW=12, BR=4; // raised bottom: top=34, bottom=102
          for (var i = 0; i < Math.min(items.length, 3); i++) {
            var it = items[i];
            var pos = positions[i];
            var bx = pos.x - BW/2;
            var pct = Math.max(0, Math.min(1, it.pct || 0));
            var fillH = pct * BH;
            var fillY = BY + BH - fillH;
            var barColor = it.color || cSafe;
            var rgbBar = hexRgb(barColor);
            s += '<rect x="'+bx+'" y="'+BY+'" width="'+BW+'" height="'+BH+'" rx="'+BR+'" ry="'+BR+'" fill="'+gp.capsule+'" stroke="rgba('+rgbSafe+',0.15)" stroke-width="0.5"/>';
            if (fillH > 0) {
              var clipId = 'sc-'+i+'-'+(Math.random()*1e6|0);
              s += '<defs><clipPath id="'+clipId+'"><rect x="'+bx+'" y="'+fillY.toFixed(1)+'" width="'+BW+'" height="'+fillH.toFixed(1)+'" rx="'+BR+'" ry="'+BR+'"/></clipPath></defs>';
              s += '<rect x="'+bx+'" y="'+BY+'" width="'+BW+'" height="'+BH+'" rx="'+BR+'" ry="'+BR+'" fill="'+barColor+'" opacity="0.6" clip-path="url(#'+clipId+')"/>';
              s += '<rect x="'+(bx-1)+'" y="'+(fillY-1).toFixed(1)+'" width="'+(BW+2)+'" height="3" rx="1" fill="'+barColor+'" opacity="0.3" clip-path="url(#'+clipId+')"/>';
            }
            // Per-item tick segments
            var nTicks = it.ticks || 4;
            for (var t = 0; t <= nTicks; t++) {
              var ty = BY + (t/nTicks) * BH;
              s += '<line x1="'+(bx-2)+'" y1="'+ty.toFixed(1)+'" x2="'+bx+'" y2="'+ty.toFixed(1)+'" stroke="rgba('+rgbSafe+',0.2)" stroke-width="0.4"/>';
            }
            s += '<text x="'+pos.x+'" y="'+(BY+BH+12)+'" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="9" font-weight="700" fill="'+barColor+'">'+it.value+'</text>';
            s += '<text x="'+pos.x+'" y="'+(BY-5)+'" text-anchor="middle" font-family="Michroma,sans-serif" font-size="5.5" fill="rgba('+rgbSafe+',0.55)" letter-spacing="0.8px">'+it.label+'</text>';
          }
          return s;
        }

        // Render each gauge column: SVG + its own stats
        var col5 = chronoPanel.querySelector('[data-chrono="5hr"]');
        var colW = chronoPanel.querySelector('[data-chrono="weekly"]');
        // Compute side gauge data — using centralized rd.css + rd.hexRgb
        var dc = rd.duty;
        var activeRatio = dc && dc.activeHrsPerDay ? Math.round((dc.activeHrsPerDay / 24) * 100) : 0;
        var proj5Pct = Math.min(rd.proj5hr || 0, 100) / 100;
        var projWPct = Math.min(rd.projWeekly || 0, 100) / 100;
        var win5Pct = rd.remaining5hr != null ? Math.max(0, 1 - rd.remaining5hr / 5) : 0;
        var winWPct = rd.remainingWeekly != null ? Math.max(0, 1 - rd.remainingWeekly / 168) : 0;
        var dutyPct = activeRatio / 100;
        var _cPri = rd.css.pri, _cSec = rd.css.sec, _cDng = rd.css.dng, _cTrt = rd.css.trt;
        var pColor5 = rd.proj5Color;
        var pColorW = rd.projWColor;

        // 5hr: PROJ, ELAPSED (USED removed — redundant with round gauges)
        var sides5 = [
          {label:'PROJ', value:(rd.proj5hr>=100?'OVER':rd.proj5hr+'%'), pct:proj5Pct, color:pColor5, ticks:4},
          {label:'ELAPSED', value:fH(rd.elapsed5hr||0), pct:win5Pct, color:_cPri, ticks:5}
        ];
        // Weekly: PROJ, ELAPSED
        var sidesW = [
          {label:'PROJ', value:(rd.projWeekly>=100?'OVER':rd.projWeekly+'%'), pct:projWPct, color:pColorW, ticks:4},
          {label:'ELAPSED', value:fH(rd.elapsedWeekly||0), pct:winWPct, color:_cPri, ticks:7}
        ];

        if (col5) {
          col5.querySelector('[data-chrono-svg]').innerHTML = buildChrono(rd.pace5, '5-HOUR PACE', '5hr', sides5);
          col5.querySelector('[data-chrono-stats]').innerHTML =
            '<div class="cs-item"><div class="cs-label">Burn Rate</div><div class="cs-val" style="color:var(--c-primary)">'+rd.burn5hr.toFixed(1)+'%/h</div></div>' +
            '<div class="cs-item"><div class="cs-label">To Limit</div><div class="cs-val" style="color:'+rd.ttl5Color+'">'+rd.ttl5Val+'</div></div>' +
            '<div class="cs-item"><div class="cs-label">To Reset</div><div class="cs-val" style="color:var(--c-secondary)">'+rd.ttr5+'</div></div>';
        }
        if (colW) {
          colW.querySelector('[data-chrono-svg]').innerHTML = buildChrono(rd.paceW, 'WEEKLY PACE', 'wk', sidesW);
          colW.querySelector('[data-chrono-stats]').innerHTML =
            '<div class="cs-item"><div class="cs-label">Burn Rate</div><div class="cs-val" style="color:'+(wkAtLimit?'var(--c-danger)':'var(--c-secondary)')+'">'+((rd.burnWkDisplay||0).toFixed(2))+'%/h</div></div>' +
            '<div class="cs-item"><div class="cs-label">To Limit</div><div class="cs-val" style="color:'+rd.ttlWColor+'">'+rd.ttlWVal+'</div></div>' +
            '<div class="cs-item"><div class="cs-label">To Reset</div><div class="cs-val" style="color:var(--c-secondary)">'+rd.ttrW+'</div></div>';
        }

        // --- Effort Gauge: vertical aircraft-style indicator ---
        var effortEl = chronoPanel.querySelector('[data-effort-gauge]');
        if (effortEl) {
          // Compute weighted effort from all active sidecars
          var sidecars = data.sidecars || [];
          var totalTokens = 0, weightedSum = 0;
          var effortWeights = {low:0, medium:0.5, high:1.0};
          for (var si = 0; si < sidecars.length; si++) {
            var sc = sidecars[si];
            if (!sc.data) continue;
            var eff = sc.data.effortLevel || 'medium';
            var cum = sc.data.cumulative;
            var toks = cum ? (cum.input||0) + (cum.cache_read||0) + (cum.cache_write||0) + (cum.output||0) : 0;
            if (toks > 0) {
              totalTokens += toks;
              weightedSum += toks * (effortWeights[eff] != null ? effortWeights[eff] : 0.5);
            }
          }
          var effortPct = totalTokens > 0 ? weightedSum / totalTokens : 0.5;
          // Current session effort label
          var curEffort = '--';
          for (var si2 = sidecars.length - 1; si2 >= 0; si2--) {
            if (sidecars[si2].data && sidecars[si2].data.effortLevel) {
              curEffort = sidecars[si2].data.effortLevel.toUpperCase();
              break;
            }
          }

          // SVG dimensions — vacuum tube effort gauge
          var EW = 50, EH = 160;
          var tubeW = 18, tubeH = 92, tubeX = (EW - tubeW) / 2, tubeY = 24;
          var tubeCX = tubeX + tubeW/2;
          var rgbSec = hexRgb(_cSec), rgbPri = hexRgb(_cPri), rgbDng = hexRgb(_cDng);

          // Zone boundaries — inset from rounded caps so zones don't bleed into the curve
          var capInset = tubeW / 2; // radius of rounded ends
          var zoneTop = tubeY + capInset, zoneBot = tubeY + tubeH - capInset;
          var zoneH = zoneBot - zoneTop;
          var zHighH = zoneH * 0.33, zMedH = zoneH * 0.34, zLowH = zoneH * 0.33;
          var zHighY = zoneTop;
          var zMedY = zoneTop + zHighH;
          var zLowY = zoneTop + zHighH + zMedH;

          // Active zone
          var activeZone = effortPct > 0.67 ? 'high' : (effortPct > 0.33 ? 'med' : 'low');
          var activeZoneY = activeZone === 'high' ? zHighY : (activeZone === 'med' ? zMedY : zLowY);
          var activeZoneH = activeZone === 'high' ? zHighH : (activeZone === 'med' ? zMedH : zLowH);
          var bulbRgb = activeZone === 'high' ? rgbDng : (activeZone === 'med' ? rgbPri : rgbSec);
          var nColor = activeZone === 'high' ? _cDng : (activeZone === 'med' ? _cPri : _cSec);

          // Needle Y — mapped to inset zone range
          var needleY = zoneBot - (effortPct * zoneH);

          var uid = (Math.random()*1e6|0);
          var svg = '<svg viewBox="0 0 '+EW+' '+EH+'" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">';

          // --- Defs ---
          svg += '<defs>';
          // Tube clip
          svg += '<clipPath id="tc'+uid+'"><rect x="'+tubeX+'" y="'+tubeY+'" width="'+tubeW+'" height="'+tubeH+'" rx="'+tubeW/2+'"/></clipPath>';
          // Segment clip — glow fills entire tube section (extends to caps for H/L)
          var glowY = activeZone === 'high' ? tubeY : activeZoneY;
          var glowBot = activeZone === 'low' ? (tubeY + tubeH) : (activeZoneY + activeZoneH);
          var glowH = glowBot - glowY;
          svg += '<clipPath id="sc'+uid+'"><rect x="'+(tubeX-4)+'" y="'+glowY.toFixed(1)+'" width="'+(tubeW+8)+'" height="'+glowH.toFixed(1)+'"/></clipPath>';
          // Incandescent glow — tight blur
          svg += '<filter id="fg'+uid+'"><feGaussianBlur stdDeviation="3"/></filter>';
          // Hot core glow — tighter
          svg += '<filter id="fh'+uid+'"><feGaussianBlur stdDeviation="1.5"/></filter>';
          // Ambient outer glow — soft halo beyond tube glass
          svg += '<filter id="ag'+uid+'" x="-80%" y="-20%" width="260%" height="140%"><feGaussianBlur stdDeviation="6"/></filter>';
          // Glass sheen gradient
          svg += '<linearGradient id="gs'+uid+'" x1="0" y1="0" x2="1" y2="0">';
          svg += '<stop offset="0%" stop-color="white" stop-opacity="'+gp.sheenStops[0]+'"/>';
          svg += '<stop offset="35%" stop-color="white" stop-opacity="'+gp.sheenStops[1]+'"/>';
          svg += '<stop offset="65%" stop-color="white" stop-opacity="'+gp.sheenStops[2]+'"/>';
          svg += '<stop offset="100%" stop-color="white" stop-opacity="'+gp.sheenStops[3]+'"/>';
          svg += '</linearGradient>';
          svg += '</defs>';

          // --- EFFORT title top ---
          svg += '<text x="'+tubeCX+'" y="'+(tubeY-8)+'" text-anchor="middle" font-family="Michroma,sans-serif" font-size="5" font-weight="700" fill="rgba('+rgbSec+','+gp.titleAlpha+')" letter-spacing="1.5px">EFFORT</text>';

          // --- Tube caps (top & bottom metal ends) ---
          svg += '<rect x="'+(tubeX-2)+'" y="'+(tubeY-3)+'" width="'+(tubeW+4)+'" height="6" rx="2" fill="rgba('+rgbSec+','+gp.capFill+')" stroke="rgba('+rgbSec+','+gp.capStroke+')" stroke-width="0.5"/>';
          svg += '<rect x="'+(tubeX-2)+'" y="'+(tubeY+tubeH-3)+'" width="'+(tubeW+4)+'" height="6" rx="2" fill="rgba('+rgbSec+','+gp.capFill+')" stroke="rgba('+rgbSec+','+gp.capStroke+')" stroke-width="0.5"/>';

          // --- Ambient glow (behind tube, unclipped — gentle halo with randomized pulse) ---
          var pulseDur = (2.8 + Math.random() * 2.4).toFixed(1); // 2.8–5.2s
          var pulseMin = (0.4 + Math.random() * 0.25).toFixed(2); // 0.40–0.65
          var breathRx = tubeW * 0.9, breathRxMax = (breathRx * 1.15).toFixed(1);
          svg += '<ellipse cx="'+tubeCX+'" cy="'+(glowY + glowH/2).toFixed(1)+'" rx="'+breathRx.toFixed(1)+'" ry="'+(glowH*0.45).toFixed(1)+'" fill="rgba('+bulbRgb+',0.15)" filter="url(#ag'+uid+')">' +
            '<animate attributeName="opacity" values="1;'+pulseMin+';1" dur="'+pulseDur+'s" repeatCount="indefinite"/>' +
            '<animate attributeName="rx" values="'+breathRx.toFixed(1)+';'+breathRxMax+';'+breathRx.toFixed(1)+'" dur="'+pulseDur+'s" repeatCount="indefinite"/>' +
          '</ellipse>';

          // --- Glass tube body ---
          svg += '<rect x="'+tubeX+'" y="'+tubeY+'" width="'+tubeW+'" height="'+tubeH+'" rx="'+(tubeW/2)+'" fill="'+gp.tube+'" stroke="rgba('+rgbSec+','+gp.tubeStroke+')" stroke-width="0.8"/>';

          // --- Zone tints (dim) ---
          svg += '<rect x="'+tubeX+'" y="'+zHighY+'" width="'+tubeW+'" height="'+zHighH+'" fill="rgba('+rgbDng+','+gp.zoneAlpha+')" clip-path="url(#tc'+uid+')"/>';
          svg += '<rect x="'+tubeX+'" y="'+zMedY+'" width="'+tubeW+'" height="'+zMedH+'" fill="rgba('+rgbPri+','+gp.zoneAlpha+')" clip-path="url(#tc'+uid+')"/>';
          svg += '<rect x="'+tubeX+'" y="'+zLowY+'" width="'+tubeW+'" height="'+zLowH+'" fill="rgba('+rgbSec+','+gp.zoneAlpha+')" clip-path="url(#tc'+uid+')"/>';

          // --- Incandescent glow (fills full tube section including caps for H/L) ---
          var glowCY = glowY + glowH / 2;
          // Outer warm aura
          svg += '<ellipse cx="'+tubeCX+'" cy="'+glowCY.toFixed(1)+'" rx="'+(tubeW*0.6)+'" ry="'+(glowH*0.4).toFixed(1)+'" fill="rgba('+bulbRgb+','+gp.glowAlpha+')" filter="url(#fg'+uid+')" clip-path="url(#sc'+uid+')"/>';
          // Full section fill — lit up
          svg += '<rect x="'+tubeX+'" y="'+glowY.toFixed(1)+'" width="'+tubeW+'" height="'+glowH.toFixed(1)+'" fill="rgba('+bulbRgb+',0.2)" clip-path="url(#tc'+uid+')"/>';
          // Hot filament core
          svg += '<rect x="'+(tubeX+4)+'" y="'+(glowY+2).toFixed(1)+'" width="'+(tubeW-8)+'" height="'+(Math.max(glowH-4,3)).toFixed(1)+'" rx="'+(tubeW/4)+'" fill="rgba('+bulbRgb+','+gp.coreAlpha+')" filter="url(#fh'+uid+')" clip-path="url(#tc'+uid+')"/>';
          // White-hot center
          svg += '<rect x="'+(tubeX+6)+'" y="'+(glowY+4).toFixed(1)+'" width="'+(tubeW-12)+'" height="'+(Math.max(glowH-8,2)).toFixed(1)+'" rx="2" fill="rgba(255,255,255,'+gp.whiteHotAlpha+')" clip-path="url(#tc'+uid+')"/>';

          // --- Zone divider wires ---
          svg += '<line x1="'+tubeX+'" y1="'+zMedY.toFixed(1)+'" x2="'+(tubeX+tubeW)+'" y2="'+zMedY.toFixed(1)+'" stroke="rgba('+rgbSec+','+gp.wireAlpha+')" stroke-width="0.6"/>';
          svg += '<line x1="'+tubeX+'" y1="'+zLowY.toFixed(1)+'" x2="'+(tubeX+tubeW)+'" y2="'+zLowY.toFixed(1)+'" stroke="rgba('+rgbSec+','+gp.wireAlpha+')" stroke-width="0.6"/>';

          // --- Glass sheen overlay ---
          svg += '<rect x="'+tubeX+'" y="'+tubeY+'" width="'+tubeW+'" height="'+tubeH+'" rx="'+(tubeW/2)+'" fill="url(#gs'+uid+')"/>';

          // --- Tick marks (left side) ---
          for (var t = 0; t <= 10; t++) {
            var ty = tubeY + (t/10) * tubeH;
            var tw = (t % 5 === 0) ? 5 : 2.5;
            svg += '<line x1="'+(tubeX-tw-1)+'" y1="'+ty.toFixed(1)+'" x2="'+(tubeX-1)+'" y2="'+ty.toFixed(1)+'" stroke="rgba('+rgbSec+','+gp.tickStrokeAlpha+')" stroke-width="0.5"/>';
          }

          // --- Zone labels (left side) ---
          var lblX = tubeX - 9;
          svg += '<text x="'+lblX+'" y="'+(zHighY+zHighH/2+2)+'" text-anchor="middle" font-family="Michroma,sans-serif" font-size="5.5" font-weight="700" fill="'+_cDng+'" opacity="'+(activeZone==='high'?'1':'0.3')+'">H</text>';
          svg += '<text x="'+lblX+'" y="'+(zMedY+zMedH/2+2)+'" text-anchor="middle" font-family="Michroma,sans-serif" font-size="5.5" font-weight="700" fill="'+_cPri+'" opacity="'+(activeZone==='med'?'1':'0.3')+'">M</text>';
          svg += '<text x="'+lblX+'" y="'+(zLowY+zLowH/2+2)+'" text-anchor="middle" font-family="Michroma,sans-serif" font-size="5.5" font-weight="700" fill="'+_cSec+'" opacity="'+(activeZone==='low'?'1':'0.3')+'">L</text>';

          // --- Needle — pointer from RIGHT, arrow points LEFT (<) ---
          var arrowBase = tubeX + tubeW + 8;
          var arrowTip = tubeX + tubeW + 1;
          svg += '<polygon points="'+arrowTip+','+needleY.toFixed(1)+' '+arrowBase+','+(needleY-3.5).toFixed(1)+' '+arrowBase+','+(needleY+3.5).toFixed(1)+'" fill="'+nColor+'"/>';
          // Needle glow
          svg += '<polygon points="'+arrowTip+','+needleY.toFixed(1)+' '+arrowBase+','+(needleY-3.5).toFixed(1)+' '+arrowBase+','+(needleY+3.5).toFixed(1)+'" fill="'+nColor+'" opacity="0.3" filter="url(#fh'+uid+')"/>';
          // Crosshair line through tube at needle
          svg += '<line x1="'+tubeX+'" y1="'+needleY.toFixed(1)+'" x2="'+(tubeX+tubeW)+'" y2="'+needleY.toFixed(1)+'" stroke="'+nColor+'" stroke-width="1.2" opacity="0.9" clip-path="url(#tc'+uid+')"/>';
          svg += '<line x1="'+tubeX+'" y1="'+needleY.toFixed(1)+'" x2="'+(tubeX+tubeW)+'" y2="'+needleY.toFixed(1)+'" stroke="'+gp.crosshairColor+'" stroke-width="0.4" clip-path="url(#tc'+uid+')"/>';

          // --- Bottom readout ---
          svg += '<text x="'+tubeCX+'" y="'+(tubeY+tubeH+16)+'" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="12" font-weight="700" fill="'+nColor+'">'+curEffort+'</text>';
          svg += '<text x="'+tubeCX+'" y="'+(tubeY+tubeH+26)+'" text-anchor="middle" font-family="var(--font-mono)" font-size="5.5" fill="rgba('+bulbRgb+',0.6)">'+Math.round(effortPct*100)+'%w</text>';

          svg += '</svg>';
          effortEl.innerHTML = svg;
        }
      }

      // Duty Cycle card — activity pattern from history
      if (dutyCard) {
        var dc = rd.duty;
        var activeHrs = dc ? dc.activeHrsPerDay.toFixed(1) : '--';
        var activeRatio = dc && dc.activeHrsPerDay ? Math.round((dc.activeHrsPerDay / 24) * 100) : 0;
        var daysTracked = dc ? dc.activeDays : 0;
        var idleCount = dc && dc.idleHrs ? dc.idleHrs.length : 0;
        var idleStr = '';
        if (dc && dc.idleHrs && dc.idleHrs.length > 0) {
          var ranges = [];
          var start = dc.idleHrs[0], end = dc.idleHrs[0];
          for (var i = 1; i < dc.idleHrs.length; i++) {
            if (dc.idleHrs[i] === end + 1) { end = dc.idleHrs[i]; }
            else { ranges.push(start === end ? start + ':00' : start + ':00-' + (end+1) + ':00'); start = end = dc.idleHrs[i]; }
          }
          ranges.push(start === end ? start + ':00' : start + ':00-' + (end+1) + ':00');
          idleStr = ranges.join(', ');
        }
        var ratioColor = activeRatio < 40 ? 'var(--c-secondary)' : activeRatio < 70 ? 'var(--c-primary)' : 'var(--c-warm)';
        dutyCard.innerHTML =
          '<div class="ic-label">Duty Cycle</div>' +
          '<div class="ic-val-row">' +
            '<span class="ic-val" style="color:' + ratioColor + '">' + activeHrs + 'h</span>' +
            '<span class="ic-tag">/day (' + activeRatio + '%)</span>' +
          '</div>' +
          (idleStr ? '<div class="ic-sub">Idle: ' + idleStr + '</div>' : '') +
          '<div class="ic-sub">' + daysTracked + ' days tracked</div>';
      }
    }

    // --- Penguin mascot ---
    var penguinWrap = el.querySelector('.hud-penguin-wrap');
    if (penguinWrap && pScene) {
      var pState, statusText, statusClass;
      if (isError) {
        pState = 'error'; statusText = 'NO SIGNAL'; statusClass = 'error';
      } else if (isStale) {
        pState = 'stale'; statusText = 'STALE ' + (ageSec < 60 ? ageSec + 's' : Math.round(ageSec / 60) + 'm'); statusClass = 'stale';
      } else {
        pState = 'live'; statusText = 'RETRIEVING DATA'; statusClass = 'live';
      }

      // Only rebuild on state change, otherwise just update text
      var prevState = penguinWrap.dataset.pstate;
      if (prevState === pState) {
        var stEl = penguinWrap.querySelector('.hud-penguin-status');
        if (stEl) stEl.textContent = statusText;
      } else {
        penguinWrap.dataset.pstate = pState;
        penguinWrap.innerHTML =
          pScene({ state: pState, size: 'small' }) +
          '<div class="hud-penguin-status ' + statusClass + '">' + statusText + '</div>';
      }
    }
  }
});
</script>
