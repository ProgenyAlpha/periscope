<style>
/* Rate Limit HUD — .w-rlhud namespace */
.w-rlhud{display:flex;gap:16px;align-items:stretch;background:var(--bg-inset);border:1px solid var(--rule);border-radius:12px;padding:14px 16px}
.w-rlhud:hover{border-color:color-mix(in srgb,var(--rule) 50%,var(--text-dim));box-shadow:0 0 20px var(--glow)}

/* Gauges column */
.w-rlhud .hud-gauges{display:flex;gap:14px;align-items:center;flex-shrink:0}
.w-rlhud .hud-gauge{display:flex;flex-direction:column;align-items:center;gap:3px}
.w-rlhud .hud-gauge svg{filter:drop-shadow(0 0 8px var(--glow));transition:filter 0.3s}
.w-rlhud .hud-gauge:hover svg{filter:drop-shadow(0 0 14px var(--glow))}
.w-rlhud .gauge-ring-bg{fill:none;stroke:var(--rule);stroke-width:8;opacity:0.4}
.w-rlhud .gauge-ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1),stroke 0.4s}
.w-rlhud .gauge-ring-glow{fill:none;stroke-width:12;stroke-linecap:round;opacity:0.15;transition:stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1)}
.w-rlhud .gauge-center-val{font-family:var(--font-mono);font-size:16px;font-weight:700;fill:var(--text-bright,var(--text));text-anchor:middle;dominant-baseline:central;font-variant-numeric:tabular-nums}
.w-rlhud .gauge-center-label{font-family:var(--font-ui,var(--font-mono));font-size:9px;font-weight:700;fill:var(--text-dim);text-anchor:middle;letter-spacing:1.5px;text-transform:uppercase}
.w-rlhud .hud-gauge-reset{font-family:var(--font-mono);font-size:8px;color:var(--text-dim);min-height:12px;text-align:center;line-height:1.3}
.w-rlhud .hud-gauge-reset .at-limit{color:var(--c-danger,#ef4444);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}

/* Sync area */
.w-rlhud .hud-gauge-sync{display:flex;flex-direction:column;align-items:center;gap:3px;margin-top:4px}
.w-rlhud .sync-btn{font-family:var(--font-ui,var(--font-mono));font-weight:600;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border:1px solid var(--rule);background:var(--bg-void,var(--bg-inset));color:var(--text);cursor:pointer;transition:all .15s;border-radius:4px}
.w-rlhud .sync-btn:hover{border-color:var(--c-primary);color:var(--c-primary);box-shadow:0 0 12px var(--glow)}
.w-rlhud .data-age{font-family:var(--font-mono);font-size:9px;color:var(--text-dim)}

/* Intel cards 2x3 grid */
.w-rlhud .hud-intel{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;min-width:0}
.w-rlhud .hud-intel-card{background:color-mix(in srgb,var(--bg-inset) 60%,transparent);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--rule);border-radius:8px;padding:10px 12px;transition:transform .2s,border-color .2s}
.w-rlhud .hud-intel-card:hover{transform:translateY(-2px);border-color:color-mix(in srgb,var(--rule) 50%,var(--text-dim));box-shadow:0 0 12px var(--glow)}
.w-rlhud .ic-label{font-family:var(--font-mono);font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.w-rlhud .ic-val{font-family:var(--font-ui,var(--font-mono));font-size:16px;font-weight:700;color:var(--text-bright,var(--text));line-height:1.1;font-variant-numeric:tabular-nums}
.w-rlhud .ic-sub{font-family:var(--font-mono);font-size:8px;margin-top:2px;color:var(--text-dim)}
.w-rlhud .ic-val-row{display:flex;gap:4px;align-items:baseline;flex-wrap:wrap}
.w-rlhud .ic-tag{font-size:11px;color:var(--text-dim)}
.w-rlhud .ic-timing-line{font-size:13px;line-height:1.5}
.w-rlhud .ic-status{font-size:10px;font-weight:600;margin-top:2px;letter-spacing:0.5px}

/* Penguin column */
.w-rlhud .hud-penguin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:130px;flex-shrink:0}
.w-rlhud .hud-penguin-wrap .penguin-scene{width:130px;height:120px;margin-bottom:2px}
.w-rlhud .hud-penguin-wrap .penguin-body{width:90px;height:100px}
.w-rlhud .hud-penguin-wrap .data-particle{font-size:6px}
.w-rlhud .hud-penguin-status{font-family:var(--font-mono);font-size:8px;text-align:center;letter-spacing:0.5px;margin-top:2px}
.w-rlhud .hud-penguin-status.live{color:var(--c-secondary)}
.w-rlhud .hud-penguin-status.live::after{content:'...';display:inline-block;width:1.2em;text-align:left;animation:rlhud-dots 1.5s steps(4,end) infinite}
@keyframes rlhud-dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
.w-rlhud .hud-penguin-status.error{color:var(--c-danger)}
.w-rlhud .hud-penguin-status.stale{color:var(--c-primary)}

/* Extra usage credit bar */
.w-rlhud .hud-extra{width:100%;margin-top:6px;display:none}
.w-rlhud .hud-extra.visible{display:block}
.w-rlhud .hud-extra-label{font-family:var(--font-mono);font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.w-rlhud .hud-extra-label .eu-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.w-rlhud .hud-extra-label .eu-dot.on{background:var(--signal,#22c55e);box-shadow:0 0 6px var(--signal,#22c55e)}
.w-rlhud .hud-extra-label .eu-dot.off{background:var(--text-dim);opacity:0.5}
.w-rlhud .hud-extra-bar{height:5px;background:var(--rule);border-radius:3px;overflow:hidden}
.w-rlhud .hud-extra-fill{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1),background 0.4s}
.w-rlhud .hud-extra-val{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);margin-top:2px;text-align:center}

/* Gauge mode toggle — inherits theme vars (lives in .widget-title, outside .w-rlhud) */
.hud-mode-toggle{font-family:var(--font-mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;
  padding:2px 8px;border:1px solid var(--rule);background:var(--bg-inset);color:var(--text-dim);cursor:pointer;
  border-radius:var(--radius,3px);transition:all .15s;margin-left:auto;line-height:1.4}
.hud-mode-toggle:hover{border-color:var(--c-tertiary,var(--c-primary));color:var(--c-tertiary,var(--c-primary));box-shadow:0 0 8px rgba(var(--rgb-tertiary,var(--rgb-primary)),0.15)}
.hud-mode-toggle.active{background:rgba(var(--rgb-tertiary,var(--rgb-primary)),0.08);border-color:var(--c-tertiary,var(--c-primary));color:var(--c-tertiary,var(--c-primary))}

/* Chronomark gauge panel — each gauge column: gauge on top, stats underneath */
.w-rlhud .chrono-panel{flex:1;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;min-width:0}
.w-rlhud .chrono-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:240px;max-width:420px}
.w-rlhud .chrono-col svg{overflow:visible;width:100%;height:auto}
.w-rlhud .chrono-substats{display:flex;gap:6px;width:100%}
.w-rlhud .cs-item{flex:1;text-align:center;padding:5px 8px;background:rgba(var(--rgb-tertiary,var(--rgb-primary)),0.03);border:1px solid rgba(var(--rgb-tertiary,var(--rgb-primary)),0.08);border-radius:var(--radius,4px)}
.w-rlhud .cs-label{font-family:var(--font-mono);font-size:7px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px}
.w-rlhud .cs-val{font-family:var(--font-ui,var(--font-mono));font-size:14px;font-weight:700;line-height:1.3;font-variant-numeric:tabular-nums}
@keyframes chrono-sweep{
  0%{transform:rotate(-60deg)}
  12%{transform:rotate(55deg)}
  35%{transform:rotate(-15deg)}
  55%{transform:rotate(25deg)}
  80%{transform:rotate(var(--target-rot))}
  100%{transform:rotate(var(--target-rot))}
}

/* Responsive */
@media(max-width:1024px){
  .w-rlhud{flex-direction:column;align-items:center}
  .w-rlhud .hud-gauges{justify-content:center}
  .w-rlhud .hud-gauges svg{width:80px;height:80px}
  .w-rlhud .hud-penguin-wrap{min-width:unset}
  .w-rlhud .gauge-center-val{font-size:13px}
}
@media(max-width:900px){
  .w-rlhud .hud-intel{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:640px){
  .w-rlhud{padding:10px;gap:12px}
  .w-rlhud .hud-gauges svg{width:70px;height:70px}
  .w-rlhud .gauge-center-val{font-size:12px}
  .w-rlhud .hud-intel{grid-template-columns:1fr}
}
@media(max-width:460px){
  .w-rlhud .hud-gauges{flex-direction:column}
}
</style>
<script>
Periscope.registerWidget({
  id: 'rate-limits',
  title: 'Rate Limit HUD',
  size: 'lg',
  priority: 1,

  init(el) {
    var CIRC = (2 * Math.PI * 48).toFixed(1);
    el.innerHTML =
      '<div class="widget-title">Rate Limit HUD</div>' +
      '<div class="w-rlhud">' +

        /* --- Gauges column --- */
        '<div style="display:flex;flex-direction:column;align-items:center;gap:6px">' +
          '<div class="hud-gauges">' +
            /* 5-Hour gauge */
            '<div class="hud-gauge" data-gauge="5hr">' +
              '<svg width="100" height="100" viewBox="0 0 120 120">' +
                '<circle class="gauge-ring-bg" cx="60" cy="60" r="48"/>' +
                '<circle class="gauge-ring-glow" cx="60" cy="60" r="48" stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + CIRC + '" transform="rotate(-90 60 60)"/>' +
                '<circle class="gauge-ring-fill" cx="60" cy="60" r="48" stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + CIRC + '" transform="rotate(-90 60 60)"/>' +
                '<text class="gauge-center-val" x="60" y="55">--%</text>' +
                '<text class="gauge-center-label" x="60" y="72">5-HOUR</text>' +
              '</svg>' +
              '<div class="hud-gauge-reset" data-reset="5hr"></div>' +
            '</div>' +
            /* Weekly gauge — center, with SYNC underneath */
            '<div class="hud-gauge" data-gauge="weekly">' +
              '<svg width="100" height="100" viewBox="0 0 120 120">' +
                '<circle class="gauge-ring-bg" cx="60" cy="60" r="48"/>' +
                '<circle class="gauge-ring-glow" cx="60" cy="60" r="48" stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + CIRC + '" transform="rotate(-90 60 60)"/>' +
                '<circle class="gauge-ring-fill" cx="60" cy="60" r="48" stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + CIRC + '" transform="rotate(-90 60 60)"/>' +
                '<text class="gauge-center-val" x="60" y="55">--%</text>' +
                '<text class="gauge-center-label" x="60" y="72">WEEKLY</text>' +
              '</svg>' +
              '<div class="hud-gauge-reset" data-reset="weekly"></div>' +
              '<div class="hud-gauge-sync">' +
                '<button class="sync-btn" data-action="sync">SYNC</button>' +
                '<span class="data-age">--</span>' +
              '</div>' +
            '</div>' +
            /* Sonnet gauge */
            '<div class="hud-gauge" data-gauge="sonnet">' +
              '<svg width="100" height="100" viewBox="0 0 120 120">' +
                '<circle class="gauge-ring-bg" cx="60" cy="60" r="48"/>' +
                '<circle class="gauge-ring-glow" cx="60" cy="60" r="48" stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + CIRC + '" transform="rotate(-90 60 60)"/>' +
                '<circle class="gauge-ring-fill" cx="60" cy="60" r="48" stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + CIRC + '" transform="rotate(-90 60 60)"/>' +
                '<text class="gauge-center-val" x="60" y="55">--%</text>' +
                '<text class="gauge-center-label" x="60" y="72">SONNET</text>' +
              '</svg>' +
              '<div class="hud-gauge-reset" data-reset="sonnet"></div>' +
            '</div>' +
          '</div>' +
          /* Extra usage credit bar — hidden until data arrives */
          '<div class="hud-extra" data-extra="wrap"></div>' +
        '</div>' +

        /* --- Intel cards 2x3 (text mode) --- */
        '<div class="hud-intel" data-view="text">' +
          '<div class="hud-intel-card" data-card="burn"></div>' +
          '<div class="hud-intel-card" data-card="ttl"></div>' +
          '<div class="hud-intel-card" data-card="proj"></div>' +
          '<div class="hud-intel-card" data-card="window"></div>' +
          '<div class="hud-intel-card" data-card="pace"></div>' +
          '<div class="hud-intel-card" data-card="duty"></div>' +
        '</div>' +

        /* --- Chronomark gauge panel (gauge mode, hidden by default) --- */
        '<div class="chrono-panel" data-view="gauge" style="display:none">' +
          '<div class="chrono-col" data-chrono="5hr">' +
            '<div data-chrono-svg></div>' +
            '<div class="chrono-substats" data-chrono-stats></div>' +
          '</div>' +
          '<div class="chrono-col" data-chrono="weekly">' +
            '<div data-chrono-svg></div>' +
            '<div class="chrono-substats" data-chrono-stats></div>' +
          '</div>' +
        '</div>' +

        /* --- Penguin mascot --- */
        '<div class="hud-penguin-wrap"></div>' +

      '</div>';

    // Wire SYNC button
    el.querySelector('[data-action="sync"]').addEventListener('click', function() {
      if (typeof Periscope.refreshUsage === 'function') Periscope.refreshUsage();
    });

    // Gauge mode toggle — only for starfield themes
    var isStarfield = (document.documentElement.getAttribute('data-theme') || '').indexOf('starfield') !== -1;
    if (isStarfield) {
      var titleEl = el.querySelector('.widget-title');
      var toggleBtn = document.createElement('button');
      toggleBtn.className = 'hud-mode-toggle';
      toggleBtn.textContent = 'GAUGES';
      titleEl.style.display = 'flex';
      titleEl.style.alignItems = 'center';
      titleEl.style.gap = '8px';
      titleEl.appendChild(toggleBtn);

      var gaugeMode = localStorage.getItem('periscope-hud-gauges') === '1';
      var textView = el.querySelector('[data-view="text"]');
      var gaugeView = el.querySelector('[data-view="gauge"]');

      function applyMode() {
        if (gaugeMode) {
          textView.style.display = 'none';
          gaugeView.style.display = '';
          toggleBtn.classList.add('active');
        } else {
          textView.style.display = '';
          gaugeView.style.display = 'none';
          toggleBtn.classList.remove('active');
        }
      }
      applyMode();

      toggleBtn.addEventListener('click', function() {
        gaugeMode = !gaugeMode;
        localStorage.setItem('periscope-hud-gauges', gaugeMode ? '1' : '0');
        applyMode();
        // Force re-render with stashed data
        if (el._lastData) Periscope._widgets.get('rate-limits').render(el, el._lastData);
      });
    }
  },

  render(el, data) {
    el._lastData = data; // stash for toggle re-render
    var CIRC = 2 * Math.PI * 48;

    // --- Resolve runtime globals with safe fallbacks ---
    var tColor = typeof thresholdColor === 'function' ? thresholdColor
      : function(p) { return p < 50 ? '#22c55e' : p < 80 ? '#d7ab61' : '#c82337'; };
    var pColor = typeof projColor === 'function' ? projColor
      : function(p) { if (p >= 100) return 'var(--c-danger)'; if (p >= 80) return 'var(--c-warm)'; if (p >= 50) return 'var(--c-primary)'; return 'var(--c-secondary)'; };
    var fH = typeof fmtHrs === 'function' ? fmtHrs
      : function(h) { if (h === Infinity || h > 999) return '\u221E'; if (h < 1) return Math.round(h*60)+'m'; if (h >= 24) return (h/24).toFixed(1)+'d'; return h.toFixed(1)+'h'; };
    var pScene = typeof penguinScene === 'function' ? penguinScene : null;
    var prep = typeof prepRateLimitData === 'function' ? prepRateLimitData : null;

    // --- Ring gauge updater ---
    function setRing(key, pct, resetIso) {
      var cell = el.querySelector('[data-gauge="' + key + '"]');
      if (!cell) return;
      var fill = cell.querySelector('.gauge-ring-fill');
      var glow = cell.querySelector('.gauge-ring-glow');
      var valEl = cell.querySelector('.gauge-center-val');
      var resetEl = cell.querySelector('[data-reset="' + key + '"]');

      if (pct == null || !isFinite(pct)) {
        fill.style.strokeDashoffset = CIRC;
        fill.style.stroke = 'var(--text-dim)';
        if (glow) { glow.style.strokeDashoffset = CIRC; glow.style.stroke = 'var(--text-dim)'; }
        if (valEl) valEl.textContent = '--%';
        if (resetEl) resetEl.innerHTML = '';
        return;
      }
      var clamped = Math.min(Math.max(pct, 0), 100);
      var color = tColor(clamped);
      var offset = CIRC * (1 - clamped / 100);
      fill.style.strokeDashoffset = offset;
      fill.style.stroke = color;
      if (glow) { glow.style.strokeDashoffset = offset; glow.style.stroke = color; }
      if (valEl) valEl.textContent = Math.round(clamped) + '%';

      // Reset countdown + at-limit status
      if (resetEl) {
        var atLimit = pct >= 100;
        var resetText = '';
        if (resetIso) {
          var diffMin = Math.round((new Date(resetIso) - Date.now()) / 60000);
          if (diffMin <= 0) {
            resetText = 'resets now';
          } else if (diffMin < 60) {
            resetText = 'resets ' + diffMin + 'm';
          } else {
            var hrs = Math.floor(diffMin / 60);
            var mins = diffMin % 60;
            resetText = 'resets ' + hrs + 'h' + (mins > 0 ? mins + 'm' : '');
          }
        }
        if (atLimit) {
          resetEl.innerHTML = '<span class="at-limit">at limit</span>' + (resetText ? ' \u2014 ' + resetText : '');
        } else {
          resetEl.innerHTML = resetText;
        }
      }
    }

    // --- Data extraction ---
    var lu = data && data.liveUsage;
    var pct5 = lu && lu.pct5hr >= 0 ? lu.pct5hr : null;
    var pctW = lu && lu.pctWeekly >= 0 ? lu.pctWeekly : null;
    var pctS = lu && lu.pctSonnet >= 0 ? lu.pctSonnet : null;

    // Set ring gauges
    setRing('5hr', pct5, lu ? lu.reset5hr : null);
    setRing('weekly', pctW, lu ? lu.resetWeekly : null);
    setRing('sonnet', pctS, lu ? lu.resetSonnet : null);

    // --- Data age + signal state ---
    var ageEl = el.querySelector('.data-age');
    var isLive = lu && lu.fetched_at;
    var ageSec = isLive ? Math.round(Date.now() / 1000 - lu.fetched_at) : Infinity;
    var isStale = ageSec > 120;
    var isError = !isLive;
    if (ageEl) {
      if (isError) ageEl.textContent = 'no data';
      else if (ageSec < 60) ageEl.textContent = ageSec + 's ago';
      else ageEl.textContent = Math.round(ageSec / 60) + 'm ago';
    }

    // --- Extra Usage ---
    var extraWrap = el.querySelector('[data-extra="wrap"]');
    if (extraWrap) {
      var eu = lu && lu.extra_usage;
      if (eu) {
        extraWrap.classList.add('visible');
        var anyAtLimit = (pctW != null && pctW >= 100) || (pct5 != null && pct5 >= 100);
        if (eu.is_enabled) {
          var euUsed = eu.used_credits || 0;
          var euLimit = eu.monthly_limit;
          var burning = anyAtLimit && euUsed > 0;
          var euLabel = burning ? 'BURNING EXTRA USAGE' : 'EXTRA USAGE';
          if (euLimit != null && euLimit > 0) {
            var euPct = Math.min(100, (euUsed / euLimit) * 100);
            var euColor = burning ? 'var(--c-danger)' : euPct < 50 ? 'var(--c-secondary)' : euPct < 80 ? 'var(--c-primary)' : 'var(--c-danger)';
            extraWrap.innerHTML =
              '<div class="hud-extra-label"><span class="eu-dot on"></span>' + euLabel + '</div>' +
              '<div class="hud-extra-bar"><div class="hud-extra-fill" style="width:' + euPct.toFixed(1) + '%;background:' + euColor + '"></div></div>' +
              '<div class="hud-extra-val">$' + euUsed.toFixed(2) + ' / $' + euLimit.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) + '</div>';
          } else {
            extraWrap.innerHTML =
              '<div class="hud-extra-label"><span class="eu-dot on"></span>' + euLabel + ' \u2014 NO LIMIT</div>' +
              '<div class="hud-extra-val">$' + euUsed.toFixed(2) + ' spent</div>';
          }
        } else {
          extraWrap.innerHTML =
            '<div class="hud-extra-label"><span class="eu-dot off"></span>EXTRA USAGE: AVAILABLE</div>';
        }
      } else {
        extraWrap.classList.remove('visible');
        extraWrap.innerHTML = '';
      }
    }

    // --- Intel cards via prepRateLimitData ---
    var rd = prep ? prep(data) : null;
    var burnCard = el.querySelector('[data-card="burn"]');
    var ttlCard = el.querySelector('[data-card="ttl"]');
    var projCard = el.querySelector('[data-card="proj"]');
    var winCard = el.querySelector('[data-card="window"]');
    var paceCard = el.querySelector('[data-card="pace"]');
    var dutyCard = el.querySelector('[data-card="duty"]');

    if (!rd) {
      var emptyMsg = '<div class="ic-label">--</div><div class="ic-sub">Sync rate limits to populate</div>';
      if (burnCard) burnCard.innerHTML = emptyMsg;
      if (ttlCard) ttlCard.innerHTML = emptyMsg;
      if (projCard) projCard.innerHTML = emptyMsg;
      if (winCard) winCard.innerHTML = emptyMsg;
      if (paceCard) paceCard.innerHTML = emptyMsg;
      if (dutyCard) dutyCard.innerHTML = emptyMsg;
    } else {
      var wkAtLimit = rd.pctW >= 100;
      var hrAtLimit = rd.pct5 >= 100;

      // Burn Rate card
      if (burnCard) {
        var burnWkVal = rd.burnWeeklyActive != null ? rd.burnWeeklyActive : rd.burnWeekly;
        burnCard.innerHTML =
          '<div class="ic-label">Burn Rate</div>' +
          '<div class="ic-val-row">' +
            '<span class="ic-val" style="color:var(--c-primary)">' + rd.burn5hr.toFixed(1) + '%/h</span>' +
            '<span class="ic-tag">5hr</span>' +
          '</div>' +
          '<div class="ic-val-row">' +

        // Chronomark half-gauge builder — full-size (200x115 viewBox)

        function buildChrono(pace, label, uid, sides) {

          var rgbSafe=hexRgb(cSafe);
          function pol(r,a){return{x:CX+r*Math.cos(a*DEG),y:CY+r*Math.sin(a*DEG)}}
          function arc(r,s,e){var p1=pol(r,s),p2=pol(r,e);var lg=(e-s)>180?1:0;return'M '+p1.x.toFixed(1)+','+p1.y.toFixed(1)+' A '+r+','+r+' 0 '+lg+',1 '+p2.x.toFixed(1)+','+p2.y.toFixed(1)}

            if(maj){var lp=pol(52,ta);tks+='<text x="'+lp.x.toFixed(1)+'" y="'+(lp.y+2.5).toFixed(1)+'" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="8" fill="rgba('+rgbSafe+',0.45)" font-weight="600">'+tp.toFixed(1)+'</text>';}
          }

          if(warnLit) warnLight+='<circle cx="'+wlPos.x.toFixed(1)+'" cy="'+wlPos.y.toFixed(1)+'" r="6" fill="none" stroke="'+cDanger+'" stroke-width="0.4" opacity="0.3"/><circle cx="'+wlPos.x.toFixed(1)+'" cy="'+wlPos.y.toFixed(1)+'" r="3.5" fill="'+cDanger+'" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.2s" repeatCount="indefinite"/></circle>';

          return '<svg width="272" height="156" viewBox="0 0 200 115">' +
            '<defs><filter id="cg-'+uid+'"><feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="rgba('+rgbSafe+',0.5)"/></filter></defs>' +
            // Housing

        // Vertical capsule gauge builder — renders in SVG dead space flanking the half-gauge
        function buildSideGauges(items, rgbSafe, cSafe, cWarn, cDanger, hexRgb) {

          // Position configs: tucked into far corners outside the arc housing

            var pos = positions[i];

            var fillH = pct * BH;

            var barColor = it.color || cSafe;
            var rgbBar = hexRgb(barColor);
            s += '<rect x="'+bx+'" y="'+BY+'" width="'+BW+'" height="'+BH+'" rx="'+BR+'" ry="'+BR+'" fill="rgba(8,14,20,0.7)" stroke="rgba('+rgbSafe+',0.15)" stroke-width="0.5"/>';

            s += '<text x="'+pos.x+'" y="'+(BY-2)+'" text-anchor="middle" font-family="Michroma,sans-serif" font-size="2.5" fill="rgba('+rgbSafe+',0.45)" letter-spacing="0.8px">'+it.label+'</text>';

        }

        // Render each gauge column: SVG + its own stats

        // Compute side gauge data

        // Resolve CSS vars for inline SVG (can't use var() in SVG attributes)

        pState = 'stale'; statusText = 'STALE ' + (ageSec < 60 ? ageSec + 's' : Math.round(ageSec / 60) + 'm'); statusClass = 'stale';
      } else {
        pState = 'live'; statusText = 'RETRIEVING DATA'; statusClass = 'live';
      }

      // Only rebuild on state change, otherwise just update text
      var prevState = penguinWrap.dataset.pstate;
      if (prevState === pState) {
        var stEl = penguinWrap.querySelector('.hud-penguin-status');
        if (stEl) stEl.textContent = statusText;
      } else {
        penguinWrap.dataset.pstate = pState;
        penguinWrap.innerHTML =
          pScene({ state: pState, size: 'small' }) +
          '<div class="hud-penguin-status ' + statusClass + '">' + statusText + '</div>';
      }
    }
  }
});
</script>
