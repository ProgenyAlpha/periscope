<style>
.w-cache-v2{display:flex;flex-direction:column;gap:6px}
.w-cache-v2 .cs-hdr{display:flex;align-items:center;justify-content:space-between}
.w-cache-v2 .tog-group{display:inline-flex;border:1px solid var(--rule);border-radius:var(--radius);overflow:hidden}
.w-cache-v2 .tog{padding:2px 8px;border:none;background:var(--bg-inset);color:var(--text-dim);font-family:var(--font-mono);font-size:0.55rem;cursor:pointer;transition:all .15s;letter-spacing:0.5px}
.w-cache-v2 .tog:not(:last-child){border-right:1px solid var(--rule)}
.w-cache-v2 .tog.active{background:var(--c-primary);color:var(--bg-void);font-weight:600}
.w-cache-v2 .tog:hover:not(.active){background:var(--bg-hover);color:var(--text)}
.w-cache-v2 .hero{text-align:center;padding:8px 0}
.w-cache-v2 .hero-val{font-size:1.4rem;font-weight:700;font-family:var(--font-mono);line-height:1}
.w-cache-v2 .hero-val.positive{color:var(--c-secondary,#22c55e)}
.w-cache-v2 .hero-val.negative{color:var(--c-danger,#ef4444)}
.w-cache-v2 .hero-val.zero{color:var(--text-dim)}
.w-cache-v2 .hero-sub{font-size:0.55rem;text-transform:uppercase;letter-spacing:2px;color:var(--text-dim);margin-top:4px}
.w-cache-v2 .breakdown{display:grid;grid-template-columns:1fr auto;gap:1px 12px;font-family:var(--font-mono);font-size:0.65rem;padding:10px 12px;background:var(--bg-inset);border:1px solid var(--rule);border-radius:var(--radius,6px)}
.w-cache-v2 .breakdown .lbl{color:var(--text-dim)}
.w-cache-v2 .breakdown .val{text-align:right;color:var(--text-bright);font-weight:600}
.w-cache-v2 .breakdown .val.dim{color:var(--text-dim);font-weight:400}
.w-cache-v2 .breakdown .val.green{color:var(--c-secondary,#22c55e)}
.w-cache-v2 .breakdown .sep{grid-column:1/-1;height:1px;background:var(--rule);margin:3px 0}
.w-cache-v2 .hit-bar-wrap{display:flex;flex-direction:column;gap:4px}
.w-cache-v2 .hit-bar-hdr{display:flex;justify-content:space-between;align-items:baseline}
.w-cache-v2 .hit-bar-label{font-size:0.55rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim)}
.w-cache-v2 .hit-bar-val{font-family:var(--font-mono);font-size:0.75rem;font-weight:600;color:var(--text-bright)}
.w-cache-v2 .hit-bar{height:6px;border-radius:3px;background:var(--bg-inset);overflow:hidden}
.w-cache-v2 .hit-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease,background 0.3s}
.w-cache-v2 .hit-bar-note{font-family:var(--font-mono);font-size:0.55rem;color:var(--text-dim);text-align:right}
</style>
<script>
Periscope.registerWidget({
  id: 'cache-savings',
  title: 'Cache Savings',
  size: 'md',
  priority: 22,

  init(el) {
    el.innerHTML =
      '<div class="cs-hdr"><span class="widget-title" style="margin-bottom:0">Cache Savings</span>' +
        '<div class="tog-group" id="csv2-range">' +
          '<button class="tog active" data-val="5h">5h</button>' +
          '<button class="tog" data-val="24h">24h</button>' +
          '<button class="tog" data-val="7d">7d</button>' +
          '<button class="tog" data-val="all">All</button>' +
        '</div>' +
      '</div>' +
      '<div class="w-cache-v2">' +
        '<div class="hero">' +
          '<div class="hero-val zero" id="csv2-hero">--</div>' +
          '<div class="hero-sub" id="csv2-herosub">net savings</div>' +
        '</div>' +
        '<div class="breakdown">' +
          '<span class="lbl">Without cache</span><span class="val dim" id="csv2-without">--</span>' +
          '<span class="lbl">Actual cost</span><span class="val" id="csv2-actual">--</span>' +
          '<div class="sep"></div>' +
          '<span class="lbl">Cache saved</span><span class="val green" id="csv2-saved">--</span>' +
          '<span class="lbl">Cache write overhead</span><span class="val dim" id="csv2-overhead">--</span>' +
          '<span class="lbl">Savings rate</span><span class="val" id="csv2-rate">--</span>' +
        '</div>' +
        '<div class="hit-bar-wrap">' +
          '<div class="hit-bar-hdr"><span class="hit-bar-label">Cache Hit Rate</span><span class="hit-bar-val" id="csv2-hit">0%</span></div>' +
          '<div class="hit-bar"><div class="hit-bar-fill" id="csv2-bar" style="width:0%"></div></div>' +
          '<div class="hit-bar-note" id="csv2-note"></div>' +
        '</div>' +
      '</div>';

    el._csvRange = '5h';
    var self = this;
    el.querySelector('#csv2-range').querySelectorAll('.tog').forEach(function(btn) {
      btn.addEventListener('click', function() {
        el.querySelector('#csv2-range').querySelectorAll('.tog').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        el._csvRange = btn.dataset.val;
        if (Periscope._data) {
          var w = Periscope._widgets.get('cache-savings');
          if (w && w.render) w.render(el, Periscope._data);
        }
      });
    });
  },

  render(el, data) {
    var range = el._csvRange || '5h';
    var fmt = function(v) { return v >= 100 ? '$' + v.toFixed(0) : v >= 10 ? '$' + v.toFixed(1) : '$' + v.toFixed(2); };
    var fmtT = function(n) { return n >= 1e9 ? (n/1e9).toFixed(1)+'B' : n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : n.toString(); };

    var DEFAULT_PRICING = { input: 5, cache_read: 0.5, cache_write: 6.25, output: 25 };

    // Find latest model for pricing
    var latestModel = null;
    var sidecars = data.sidecars || [];
    sidecars.forEach(function(s) {
      var lt = s.data && s.data.lastTurn;
      if (lt && lt.model) latestModel = lt.model;
    });

    var pricing = DEFAULT_PRICING;
    if (typeof getModelPricing === 'function' && latestModel) {
      var mp = getModelPricing(latestModel);
      if (mp && mp.input > 0) pricing = mp;
    }

    var isMax = typeof isSubscription === 'function' ? isSubscription(data) : false;
    var cs = typeof costSuffix === 'function' ? costSuffix(data) : '';

    // --- Compute totals based on time window ---
    var totalIn = 0, totalCR = 0, totalCW = 0, totalOut = 0;

    if (range === 'all') {
      // Lifetime from sidecars (most accurate)
      sidecars.forEach(function(s) {
        var c = s.data && s.data.cumulative;
        if (!c) return;
        totalIn += c.input || 0;
        totalCR += c.cache_read || 0;
        totalCW += c.cache_write || 0;
        totalOut += c.output || 0;
      });
    } else {
      // Windowed from history (delta = max - min per session)
      var windowMs = range === '5h' ? 5*3600e3 : range === '24h' ? 24*3600e3 : 7*24*3600e3;
      var cutoff = Date.now() - windowMs;
      var history = data.history || [];
      var bySid = {};
      for (var i = 0; i < history.length; i++) {
        var h = history[i];
        var t = new Date(h.ts).getTime();
        if (t < cutoff) continue;
        var sid = h.sid;
        if (!bySid[sid]) bySid[sid] = {
          minIn: h.input||0, maxIn: h.input||0,
          minCR: h.cr||0, maxCR: h.cr||0,
          minCW: h.cw||0, maxCW: h.cw||0,
          minOut: h.out||0, maxOut: h.out||0
        };
        var s = bySid[sid];
        var inp = h.input||0; if (inp < s.minIn) s.minIn = inp; if (inp > s.maxIn) s.maxIn = inp;
        var cr = h.cr||0; if (cr < s.minCR) s.minCR = cr; if (cr > s.maxCR) s.maxCR = cr;
        var cw = h.cw||0; if (cw < s.minCW) s.minCW = cw; if (cw > s.maxCW) s.maxCW = cw;
        var out = h.out||0; if (out < s.minOut) s.minOut = out; if (out > s.maxOut) s.maxOut = out;
      }
      for (var sid in bySid) {
        var sv = bySid[sid];
        totalIn += sv.maxIn - sv.minIn;
        totalCR += sv.maxCR - sv.minCR;
        totalCW += sv.maxCW - sv.minCW;
        totalOut += sv.maxOut - sv.minOut;
      }
    }

    // --- Calculations ---
    var withoutCache = ((totalIn + totalCR) / 1e6) * pricing.input + (totalCW / 1e6) * pricing.cache_write + (totalOut / 1e6) * pricing.output;
    var actualCost = (totalIn / 1e6) * pricing.input + (totalCR / 1e6) * pricing.cache_read + (totalCW / 1e6) * pricing.cache_write + (totalOut / 1e6) * pricing.output;
    var cacheSaved = isMax
      ? (totalCR / 1e6) * pricing.input
      : (totalCR / 1e6) * (pricing.input - pricing.cache_read);
    var cwCost = (totalCW / 1e6) * pricing.cache_write;
    var netSavings = cacheSaved - cwCost;
    var savingsRate = withoutCache > 0 ? (netSavings / withoutCache * 100) : 0;

    var totalInput = totalIn + totalCR;
    var hitRate = totalInput > 0 ? (totalCR / totalInput * 100) : 0;

    // --- Render ---
    var heroEl = el.querySelector('#csv2-hero');
    var heroSub = el.querySelector('#csv2-herosub');

    if (isMax) {
      heroEl.textContent = fmtT(totalCR);
      heroEl.className = totalCR > 0 ? 'hero-val positive' : 'hero-val zero';
      heroSub.textContent = 'tokens served from cache';

      el.querySelector('#csv2-without').textContent = fmtT(totalIn + totalCR) + ' input tokens';
      el.querySelector('#csv2-actual').textContent = fmtT(totalIn) + ' fresh input';
      el.querySelector('#csv2-saved').textContent = fmtT(totalCR) + ' from cache';
      el.querySelector('#csv2-overhead').textContent = fmtT(totalCW) + ' cache writes';
      el.querySelector('#csv2-rate').textContent = hitRate > 0 ? Math.round(hitRate) + '% hit rate' : '--';

      var lbls = el.querySelectorAll('.breakdown .lbl');
      if (lbls.length >= 5) {
        lbls[0].textContent = 'Total input demand';
        lbls[1].textContent = 'Fresh tokens sent';
        lbls[2].textContent = 'Served from cache';
        lbls[3].textContent = 'Cache write overhead';
        lbls[4].textContent = 'Cache efficiency';
      }
    } else {
      if (netSavings > 0) {
        heroEl.textContent = '+' + fmt(netSavings) + cs;
        heroEl.className = 'hero-val positive';
      } else if (netSavings < 0) {
        heroEl.textContent = '-' + fmt(Math.abs(netSavings)) + cs;
        heroEl.className = 'hero-val negative';
      } else {
        heroEl.textContent = fmt(0) + cs;
        heroEl.className = 'hero-val zero';
      }
      heroSub.textContent = 'net savings';

      el.querySelector('#csv2-without').textContent = fmt(withoutCache) + cs;
      el.querySelector('#csv2-actual').textContent = fmt(actualCost) + cs;
      el.querySelector('#csv2-saved').textContent = '+' + fmt(cacheSaved) + cs;
      el.querySelector('#csv2-overhead').textContent = '-' + fmt(cwCost) + cs;
      el.querySelector('#csv2-rate').textContent = savingsRate > 0 ? Math.round(savingsRate) + '% of bill' : '--';

      var lbls = el.querySelectorAll('.breakdown .lbl');
      if (lbls.length >= 5) {
        lbls[0].textContent = 'Without cache';
        lbls[1].textContent = 'Actual cost';
        lbls[2].textContent = 'Cache saved';
        lbls[3].textContent = 'Cache write overhead';
        lbls[4].textContent = 'Savings rate';
      }
    }

    var hitDisplay = hitRate >= 95 ? hitRate.toFixed(1) + '%' : Math.round(hitRate) + '%';
    el.querySelector('#csv2-hit').textContent = hitDisplay;
    var bar = el.querySelector('#csv2-bar');
    bar.style.width = Math.min(hitRate, 100) + '%';
    bar.style.background = hitRate >= 90 ? 'var(--c-secondary)' : hitRate >= 70 ? 'var(--c-warm)' : 'var(--c-danger)';

    var note = el.querySelector('#csv2-note');
    if (isMax && totalCR > 0) {
      note.textContent = 'API-equivalent savings: ' + fmt(netSavings > 0 ? netSavings : 0);
    } else if (totalCR > 0) {
      note.textContent = fmtT(totalCR) + ' tokens served from cache';
    } else {
      note.textContent = 'No cache data yet';
    }
  }
});
</script>
