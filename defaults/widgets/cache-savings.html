<style>
.w-cache .donut-section{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:14px}
.w-cache .donut-wrap{position:relative;width:100px;height:100px}
.w-cache .donut-svg{transform:rotate(-90deg)}
.w-cache .donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.w-cache .donut-pct{font-size:1.4rem;font-weight:600;font-family:var(--font-mono);color:var(--text-bright);line-height:1}
.w-cache .donut-sub{font-size:0.5rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim)}
.w-cache .donut-legend{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.w-cache .donut-legend span{display:flex;align-items:center;gap:4px;font-size:0.58rem;color:var(--text-dim);font-family:var(--font-mono)}
.w-cache .donut-legend span::before{content:'';width:7px;height:7px;border-radius:50%;flex-shrink:0}
.w-cache .dl-input::before{background:var(--c-tertiary)}
.w-cache .dl-cr::before{background:var(--c-secondary)}
.w-cache .dl-cw::before{background:var(--c-danger)}

.w-cache .stats-row{display:flex;gap:8px;justify-content:space-between;margin-bottom:14px}
.w-cache .stat{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0}
.w-cache .stat-val{font-size:0.95rem;font-weight:600;font-family:var(--font-mono);color:var(--text-bright);line-height:1;white-space:nowrap}
.w-cache .stat-label{font-size:0.5rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);text-align:center;line-height:1.2}
.w-cache .stat-positive{color:#22c55e}
.w-cache .stat-negative{color:var(--c-danger)}

.w-cache .seg-section{padding-top:10px;border-top:1px solid var(--rule)}
.w-cache .seg-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;background:var(--bg-inset)}
.w-cache .seg-bar span{height:100%;transition:width 0.5s ease}
.w-cache .sb-input{background:var(--c-tertiary)}
.w-cache .sb-cr{background:var(--c-secondary)}
.w-cache .sb-cw{background:var(--c-danger)}
.w-cache .sb-out{background:var(--c-primary)}
.w-cache .seg-labels{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;justify-content:space-between}
.w-cache .seg-labels span{display:flex;align-items:center;gap:4px;font-size:0.55rem;color:var(--text-dim);font-family:var(--font-mono)}
.w-cache .seg-labels span::before{content:'';width:6px;height:6px;border-radius:2px;flex-shrink:0}
.w-cache .sl-input::before{background:var(--c-tertiary)}
.w-cache .sl-cr::before{background:var(--c-secondary)}
.w-cache .sl-cw::before{background:var(--c-danger)}
.w-cache .sl-out::before{background:var(--c-primary)}
.w-cache .empty-state{text-align:center;padding:24px 0;color:var(--text-dim);font-size:0.75rem;font-style:italic}
</style>
<script>
Periscope.registerWidget({
  id: 'cache-savings',
  title: 'Cache & Savings',
  size: 'md',
  priority: 22,
  init(el) {
    el.innerHTML = `
      <div class="widget-title">Cache & Savings</div>
      <div class="w-cache">
        <div class="donut-section">
          <div class="donut-wrap">
            <svg class="donut-svg" width="100" height="100" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="38" fill="none" stroke="var(--bg-inset)" stroke-width="12"/>
              <circle id="cs-arc-input" cx="50" cy="50" r="38" fill="none" stroke="var(--c-tertiary)" stroke-width="12" stroke-linecap="round" stroke-dasharray="0 238.76" stroke-dashoffset="0"/>
              <circle id="cs-arc-cr" cx="50" cy="50" r="38" fill="none" stroke="var(--c-secondary)" stroke-width="12" stroke-linecap="round" stroke-dasharray="0 238.76" stroke-dashoffset="0"/>
              <circle id="cs-arc-cw" cx="50" cy="50" r="38" fill="none" stroke="var(--c-danger)" stroke-width="12" stroke-linecap="round" stroke-dasharray="0 238.76" stroke-dashoffset="0"/>
            </svg>
            <div class="donut-center">
              <div class="donut-pct" id="cs-donut-pct">0%</div>
              <div class="donut-sub">cache hit</div>
            </div>
          </div>
          <div class="donut-legend">
            <span class="dl-input" id="cs-dl-input">Input 0</span>
            <span class="dl-cr" id="cs-dl-cr">Cache Read 0</span>
            <span class="dl-cw" id="cs-dl-cw">Cache Write 0</span>
          </div>
        </div>
        <div class="stats-row">
          <div class="stat"><span class="stat-val" id="cs-hit-rate">0%</span><span class="stat-label">Cache Hit</span></div>
          <div class="stat"><span class="stat-val" id="cs-tokens-saved">0</span><span class="stat-label">Tokens Saved</span></div>
          <div class="stat"><span class="stat-val" id="cs-cost-saved">$0.00</span><span class="stat-label">Cost Saved</span></div>
          <div class="stat"><span class="stat-val" id="cs-cw-cost">$0.00</span><span class="stat-label">Write Cost</span></div>
          <div class="stat"><span class="stat-val" id="cs-net">$0.00</span><span class="stat-label">Net Savings</span></div>
        </div>
        <div class="seg-section">
          <div class="seg-bar">
            <span class="sb-input" id="cs-sb-in" style="width:0%"></span>
            <span class="sb-cr" id="cs-sb-cr" style="width:0%"></span>
            <span class="sb-cw" id="cs-sb-cw" style="width:0%"></span>
            <span class="sb-out" id="cs-sb-out" style="width:0%"></span>
          </div>
          <div class="seg-labels">
            <span class="sl-input" id="cs-sl-in">Input 0%</span>
            <span class="sl-cr" id="cs-sl-cr">Read 0%</span>
            <span class="sl-cw" id="cs-sl-cw">Write 0%</span>
            <span class="sl-out" id="cs-sl-out">Output 0%</span>
          </div>
        </div>
      </div>`;
  },
  render(el, data) {
    const fmt = n => n >= 1e9 ? (n/1e9).toFixed(1)+'B' : n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : n.toString();
    const fmtC = v => v >= 100 ? '$'+v.toFixed(0) : v >= 10 ? '$'+v.toFixed(1) : '$'+v.toFixed(2);

    // Default pricing (Opus 4.6 $/MTok)
    const DEFAULT_PRICING = { input: 5, cache_read: 0.5, cache_write: 6.25, output: 25 };

    let totalIn=0, totalCR=0, totalCW=0, totalOut=0, latestModel=null;
    const sidecars = data.sidecars || [];
    sidecars.forEach(s => {
      const c = s.data && s.data.cumulative;
      if (!c) return;
      totalIn += c.input||0;
      totalCR += c.cache_read||0;
      totalCW += c.cache_write||0;
      totalOut += c.output||0;
      const lt = s.data && s.data.lastTurn;
      if (lt && lt.model) latestModel = lt.model;
    });

    const totalAll = totalIn + totalCR + totalCW + totalOut;
    const donutTotal = totalIn + totalCR + totalCW; // only input-side tokens for donut
    const cacheHit = (totalIn + totalCR) > 0 ? (totalCR / (totalIn + totalCR) * 100) : 0;

    // Get model pricing from shared utilities
    let pricing = DEFAULT_PRICING;
    if (typeof getModelPricing === 'function' && latestModel) {
      const mp = getModelPricing(latestModel);
      if (mp && mp.input > 0) pricing = mp;
    }

    // Subscription detection (Max vs API)
    const isMax = typeof isSubscription === 'function' ? isSubscription(data) : false;
    const cs = typeof costSuffix === 'function' ? costSuffix(data) : '';
    const pricingLabel = isMax ? 'Max (cached=free)' : 'API (cached=1/10th)';

    // Savings calculations — Max: cached reads are free. API: cached reads cost 1/10th.
    const costSaved = isMax
      ? (totalCR / 1e6) * pricing.input
      : (totalCR / 1e6) * (pricing.input - pricing.cache_read);
    const cwCost = (totalCW / 1e6) * pricing.cache_write;
    const netSavings = costSaved - cwCost;

    // --- Donut chart ---
    const circumference = 2 * Math.PI * 38; // ~238.76
    const arcInput = el.querySelector('#cs-arc-input');
    const arcCR = el.querySelector('#cs-arc-cr');
    const arcCW = el.querySelector('#cs-arc-cw');

    if (donutTotal > 0) {
      const pIn = totalIn / donutTotal;
      const pCR = totalCR / donutTotal;
      const pCW = totalCW / donutTotal;

      // Slight gap between segments (1px visual gap)
      const gap = 1.5;
      const segIn = Math.max(0, pIn * circumference - gap);
      const segCR = Math.max(0, pCR * circumference - gap);
      const segCW = Math.max(0, pCW * circumference - gap);

      const offIn = 0;
      const offCR = -(pIn * circumference);
      const offCW = -((pIn + pCR) * circumference);

      arcInput.setAttribute('stroke-dasharray', segIn + ' ' + (circumference - segIn));
      arcInput.setAttribute('stroke-dashoffset', offIn);

      arcCR.setAttribute('stroke-dasharray', segCR + ' ' + (circumference - segCR));
      arcCR.setAttribute('stroke-dashoffset', offCR);

      arcCW.setAttribute('stroke-dasharray', segCW + ' ' + (circumference - segCW));
      arcCW.setAttribute('stroke-dashoffset', offCW);
    } else {
      // Empty state: show full background ring only
      arcInput.setAttribute('stroke-dasharray', '0 ' + circumference);
      arcCR.setAttribute('stroke-dasharray', '0 ' + circumference);
      arcCW.setAttribute('stroke-dasharray', '0 ' + circumference);
    }

    // Donut center
    const pctDisplay = cacheHit >= 95 ? cacheHit.toFixed(1) + '%' : Math.round(cacheHit) + '%';
    el.querySelector('#cs-donut-pct').textContent = pctDisplay;

    // Donut legend
    el.querySelector('#cs-dl-input').textContent = 'Input ' + fmt(totalIn);
    el.querySelector('#cs-dl-cr').textContent = 'Cache Read ' + fmt(totalCR);
    el.querySelector('#cs-dl-cw').textContent = 'Cache Write ' + fmt(totalCW);

    // --- Stats row ---
    el.querySelector('#cs-hit-rate').textContent = pctDisplay;
    el.querySelector('#cs-tokens-saved').textContent = fmt(totalCR);
    el.querySelector('#cs-cost-saved').textContent = fmtC(costSaved);
    el.querySelector('#cs-cw-cost').textContent = fmtC(cwCost);

    const netEl = el.querySelector('#cs-net');
    netEl.textContent = (netSavings >= 0 ? '+' : '-') + fmtC(Math.abs(netSavings));
    netEl.className = 'stat-val ' + (netSavings >= 0 ? 'stat-positive' : 'stat-negative');

    // --- Segmented bar ---
    if (totalAll > 0) {
      el.querySelector('#cs-sb-in').style.width = (totalIn / totalAll * 100) + '%';
      el.querySelector('#cs-sb-cr').style.width = (totalCR / totalAll * 100) + '%';
      el.querySelector('#cs-sb-cw').style.width = (totalCW / totalAll * 100) + '%';
      el.querySelector('#cs-sb-out').style.width = (totalOut / totalAll * 100) + '%';
    } else {
      el.querySelector('#cs-sb-in').style.width = '0%';
      el.querySelector('#cs-sb-cr').style.width = '0%';
      el.querySelector('#cs-sb-cw').style.width = '0%';
      el.querySelector('#cs-sb-out').style.width = '0%';
    }

    const pctOf = (v) => totalAll > 0 ? Math.round(v / totalAll * 100) : 0;
    el.querySelector('#cs-sl-in').textContent = 'Input ' + pctOf(totalIn) + '%';
    el.querySelector('#cs-sl-cr').textContent = 'Read ' + pctOf(totalCR) + '%';
    el.querySelector('#cs-sl-cw').textContent = 'Write ' + pctOf(totalCW) + '%';
    el.querySelector('#cs-sl-out').textContent = 'Output ' + pctOf(totalOut) + '%';
  }
});
</script>
