<style>
/* Rate Limit Intelligence — XL widget */

.w-rli .tl-btn{background:var(--bg-inset);border:1px solid var(--rule);color:var(--text-dim);font-family:var(--font-mono);font-size:9px;padding:3px 8px;cursor:pointer;transition:all .2s;line-height:1.4}

.w-rli .window-nav{display:flex;gap:2px}

.w-rli .burn-overlay.active{opacity:1}
.w-rli .burn-badge{position:relative;padding:6px 20px;border-radius:6px;background:rgba(127,29,29,0.92);border:1px solid rgba(var(--rgb-danger,239,68,68),0.5);box-shadow:0 0 20px rgba(var(--rgb-danger,239,68,68),0.2),0 0 40px rgba(var(--rgb-danger,239,68,68),0.08);font-family:var(--font-mono);font-size:12px;font-weight:700;color:#fca5a5;letter-spacing:2px;text-transform:uppercase;animation:rli-burnPulse 2s ease-in-out infinite}
.w-rli .burn-badge::before,.w-rli .burn-badge::after{content:'';position:absolute;border-radius:50%;filter:blur(2px);animation:rli-fireFloat 1.5s ease-in-out infinite}

@keyframes rli-extraPulse{0%,100%{box-shadow:0 0 20px rgba(var(--rgb-warm,251,146,60),0.25),0 0 40px rgba(var(--rgb-danger,239,68,68),0.12)}50%{box-shadow:0 0 32px rgba(var(--rgb-warm,251,146,60),0.4),0 0 60px rgba(var(--rgb-danger,239,68,68),0.2)}}

.w-rli .burn-overlay.extra .burn-badge{background:rgba(120,53,15,0.94);border-color:rgba(var(--rgb-warm,251,146,60),0.6);color:#fdba74;animation:rli-extraPulse 2.5s ease-in-out infinite}
.w-rli .burn-overlay.extra .burn-scope{color:rgba(253,186,116,0.8)}
.w-rli .intel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding-top:6px}

.w-rli .intel-card{padding:8px 10px;background:var(--bg-inset);border-radius:6px;border-top:2px solid var(--c-tertiary)}
.w-rli .intel-card.session{border-top-color:var(--c-primary)}

.w-rli .intel-card .intel-label{font-size:8px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;font-family:var(--font-mono);margin-bottom:6px;opacity:0.7}
.w-rli .intel-card.session .intel-label{color:var(--c-primary)}
.w-rli .intel-card.weekly .intel-label{color:var(--c-tertiary)}
.w-rli .intel-card.capacity .intel-label{color:var(--c-accent)}
.w-rli .intel-card .intel-body{font-size:11px;line-height:1.7}
.w-rli .intel-card .intel-row{display:flex;justify-content:space-between;align-items:baseline;gap:6px}
.w-rli .intel-card .intel-val{font-weight:600;font-family:var(--font-mono);font-variant-numeric:tabular-nums;white-space:nowrap}
.w-rli .intel-readout{background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.06);border-radius:3px;padding:5px 12px;text-align:center;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:6px;text-shadow:0 0 8px currentColor;text-transform:uppercase}
.w-rli .intel-ref{margin-top:6px;font-size:9px;color:var(--text-dim);opacity:0.5;text-align:center}
</style>
<script>
Periscope.registerWidget({
  id: 'limit-timeline',
  title: 'Rate Limit Intelligence',
  size: 'md',
  priority: 3,

  // ── Instance state (scoped to avoid global collisions) ──
  _chart: null,
  _overlayPluginRegistered: false,
  _overlayPlugin: null,
  _overlayState: {},
  _limitTimeRange: null,
  _showProjection: true,
  _windowOffset: 0,
  _defaultsLoaded: false,

  init(el) {
    el.innerHTML = `
      <div class="widget-title">Rate Limit Intelligence</div>
      <div class="w-rli">
        <div class="chart-tl-ctrl" data-ref="ctrl">
          <button class="tl-btn" data-range="6h">6h</button>
          <button class="tl-btn" data-range="24h">24h</button>
          <button class="tl-btn" data-range="8d">8d</button>
          <button class="tl-btn" data-range="30d">30d</button>
          <button class="tl-btn" data-range="all">All</button>
          <div class="window-nav" style="margin-left:8px">
            <button class="tog" data-ref="btn-prev" title="Previous window">&#9664;</button>
            <button class="tog" data-ref="window-label" style="font-size:9px;min-width:60px;font-variant-numeric:tabular-nums">CURRENT</button>
            <button class="tog" data-ref="btn-next" title="Next window">&#9654;</button>
            <button class="tog" data-ref="btn-now" style="font-size:9px">NOW</button>
          </div>
          <span style="margin-left:auto;display:flex;gap:4px;align-items:center">
            <button class="tl-btn" data-ref="btn-proj" title="Show projected usage to window end">Proj</button>
            <button class="tl-btn" data-ref="btn-save" title="Save current view as default" style="width:28px;text-align:center">&#x2913;</button>
          </span>
        </div>
        <div class="limit-chart-wrap">
          <canvas data-ref="canvas"></canvas>
          <div class="burn-overlay" data-ref="burn-overlay">
            <div class="burn-badge">
              <span class="fire-particle" style="left:-8px;top:-6px;animation-delay:0s"></span>
              <span class="fire-particle" style="left:30%;top:-10px;animation-delay:0.3s"></span>
              <span class="fire-particle" style="right:20%;top:-8px;animation-delay:0.6s"></span>
              <span class="fire-particle" style="right:-6px;top:-4px;animation-delay:0.9s"></span>
              <span data-ref="burn-text">&#x26A0; HEAVY TOKEN BURN</span>
              <span class="burn-scope" data-ref="burn-scope"></span>
            </div>
          </div>
        </div>
        <div data-ref="penguin"></div>
        <div data-ref="insight"></div>
      </div>`;

    // Wire up control events — scoped to this widget
    const widget = this;
    const ctrl = el.querySelector('[data-ref="ctrl"]');
    ctrl.addEventListener('click', (e) => {
      const btn = e.target.closest('.tl-btn');
      if (btn && btn.dataset.range) {
        widget._limitTimeRange = btn.dataset.range;
        widget._windowOffset = 0;
        widget.render(el, Periscope._data);
        return;
      }
      if (btn && btn.dataset.ref === 'btn-proj') {
        widget._showProjection = !widget._showProjection;
        widget.render(el, Periscope._data);
        return;
      }
      if (btn && btn.dataset.ref === 'btn-save') {
        widget._saveDefaults(btn);
        return;
      }
    });
    // Window nav
    el.querySelector('[data-ref="btn-prev"]').addEventListener('click', () => { widget._windowOffset--; widget.render(el, Periscope._data); });
    el.querySelector('[data-ref="btn-next"]').addEventListener('click', () => { widget._windowOffset++; widget.render(el, Periscope._data); });
    el.querySelector('[data-ref="btn-now"]').addEventListener('click', () => { widget._windowOffset = 0; widget.render(el, Periscope._data); });
  },

  _loadDefaults() {
    if (this._defaultsLoaded) return;
    this._defaultsLoaded = true;
    try {
      const saved = JSON.parse(localStorage.getItem('periscope_rateLimit_defaults') || 'null');
      const r = saved ? saved.range : '6h';
      this._limitTimeRange = (r === '7d' ? '8d' : r === '1h' ? '6h' : r);
      this._showProjection = saved ? !!saved.projection : true;
    } catch(e) {
      this._limitTimeRange = '6h';
      this._showProjection = true;
    }
  },

  _saveDefaults(btn) {
    try {
      const defaults = { range: this._limitTimeRange, projection: this._showProjection };
      localStorage.setItem('periscope_rateLimit_defaults', JSON.stringify(defaults));
      const verify = JSON.parse(localStorage.getItem('periscope_rateLimit_defaults'));
      if (verify && verify.range === defaults.range && verify.projection === defaults.projection) {
        if (btn) { btn.textContent = '\u2713'; btn.style.color = 'var(--c-secondary)'; btn.style.borderColor = 'var(--c-secondary)'; setTimeout(() => { btn.textContent = '\u2913'; btn.style.color = ''; btn.style.borderColor = ''; }, 1500); }
      }
    } catch(e) {
      if (btn) { btn.textContent = '\u2717'; btn.style.color = 'var(--c-danger)'; setTimeout(() => { btn.textContent = '\u2913'; btn.style.color = ''; }, 1500); }
    }
  },

  // ── COLORS helper (reads CSS vars) ──
  _getColors() {
    const s = getComputedStyle(document.documentElement);
    const rgbOf = (name, fallback) => s.getPropertyValue('--rgb-' + name).trim() || fallback;
    return {
      primary: s.getPropertyValue('--c-primary').trim() || '#E06236',
      secondary: s.getPropertyValue('--c-secondary').trim() || '#D7AB61',
      tertiary: s.getPropertyValue('--c-tertiary').trim() || '#2F4C79',
      accent: s.getPropertyValue('--c-accent').trim() || '#E06236',
      danger: s.getPropertyValue('--c-danger').trim() || '#C82337',
      warm: s.getPropertyValue('--c-warm').trim() || '#E06236',
      text: s.getPropertyValue('--text').trim() || '#e8e0d4',
      text2: s.getPropertyValue('--text-dim').trim() || '#5a6270',
      grid: 'rgba(' + rgbOf('primary', '245,158,11') + ',0.04)',
      rgbDanger: rgbOf('danger', '239,68,68'),
      rgbSecondary: rgbOf('secondary', '34,197,94'),
      rgbPrimary: rgbOf('primary', '245,158,11')
    };
  },

  // ── Session segmentation ──
  _segmentSeries(points, field, resetField) {
    const GAP_MS = 10 * 60000;
    const DROP_THRESHOLD = 15;
    const out = [];
    let lastTs = null, lastVal = null, lastBucket = null;
    for (const p of points) {
      if (p[field] == null) continue;
      const curBucket = resetBucket(p[resetField]);
      const val = p[field];
      if (lastTs) {
        const resetChanged = curBucket && lastBucket && curBucket !== lastBucket;
        const bigDrop = lastVal != null && val < (lastVal - DROP_THRESHOLD);
        const bigGap = (p.ts - lastTs) > GAP_MS;
        if (resetChanged || bigDrop) {
          out.push({x: new Date(lastTs.getTime() + 1000), y: null});
        } else if (bigGap) {
          out.push({x: new Date(lastTs.getTime() + 60000), y: lastVal});
          out.push({x: new Date(lastTs.getTime() + 61000), y: null});
        }
      }
      out.push({x: p.ts, y: val});
      lastTs = p.ts;
      lastVal = val;
      lastBucket = curBucket;
    }
    return out;
  },

  // ── Chart overlay plugin (100% line, window markers, OPS WINDOW, breach pins) ──
  _ensureOverlayPlugin() {
    if (this._overlayPluginRegistered) return this._overlayPlugin;
    const widget = this;
    this._overlayPlugin = {
      id: 'rliOverlay',
      beforeDraw(chart) {
        const st = widget._overlayState || {};
        const xScale = chart.scales.x;
        const yScale = chart.scales.y;
        if (!xScale || !yScale) return;
        const ctx = chart.ctx;
        const area = chart.chartArea;
        const rd = st.rgbDanger || '239,68,68';
        const rs = st.rgbSecondary || '34,197,94';

        // 100% limit line
        const y100 = yScale.getPixelForValue(100);
        if (y100 >= area.top && y100 <= area.bottom) {
          ctx.save();
          ctx.strokeStyle = 'rgba(' + rd + ',0.25)';
          ctx.lineWidth = 1;
          ctx.setLineDash([4, 4]);
          ctx.beginPath();
          ctx.moveTo(area.left, y100);
          ctx.lineTo(area.right, y100);
          ctx.stroke();
          ctx.fillStyle = 'rgba(' + rd + ',0.4)';
          ctx.font = '9px "Fira Code"';
          ctx.textAlign = 'right';
          ctx.fillText('LIMIT', area.right - 4, y100 - 4);
          ctx.restore();
        }

        // Window boundary markers (vertical dashed lines)
        const wStart = st.showWeekly ? st.windowStartWeeklyMs : st.windowStart5hrMs;
        const wEnd = st.showWeekly ? st.windowEndWeeklyMs : st.windowEnd5hrMs;
        const wLabel = st.showWeekly ? 'WEEK' : '5HR';
        if (wStart) {
          const xStart = xScale.getPixelForValue(wStart);
          const xEnd = xScale.getPixelForValue(wEnd);
          ctx.save();
          ctx.lineWidth = 1;
          ctx.setLineDash([3, 3]);
          if (xStart >= area.left && xStart <= area.right) {
            ctx.strokeStyle = 'rgba(' + rs + ',0.35)';
            ctx.beginPath();
            ctx.moveTo(xStart, area.top);
            ctx.lineTo(xStart, area.bottom);
            ctx.stroke();
            ctx.fillStyle = 'rgba(' + rs + ',0.5)';
            ctx.font = '8px "Fira Code"';
            ctx.textAlign = 'left';
            ctx.fillText(wLabel + ' START', xStart + 3, area.top + 10);
          }
          if (xEnd >= area.left && xEnd <= area.right) {
            ctx.strokeStyle = 'rgba(' + rd + ',0.35)';
            ctx.beginPath();
            ctx.moveTo(xEnd, area.top);
            ctx.lineTo(xEnd, area.bottom);
            ctx.stroke();
            ctx.fillStyle = 'rgba(' + rd + ',0.5)';
            ctx.font = '8px "Fira Code"';
            ctx.textAlign = 'left';
            ctx.fillText('RESET', xEnd + 3, area.top + 10);
          }
          ctx.restore();
        }

        // Active 5hr window shading on 24h view
        if (st.activeRange === '24h' && st.windowStart5hrMs && st.windowEnd5hrMs) {
          const x0 = Math.max(xScale.getPixelForValue(st.windowStart5hrMs), area.left);
          const x1 = Math.min(xScale.getPixelForValue(st.windowEnd5hrMs), area.right);
          if (x1 > x0) {
            ctx.save();
            const ac = st.accentColor || '#a78bfa';
            const hr = parseInt(ac.slice(1,3),16), hg = parseInt(ac.slice(3,5),16), hb = parseInt(ac.slice(5,7),16);
            const ar = (a) => 'rgba('+hr+','+hg+','+hb+','+a+')';
            ctx.fillStyle = ar(0.06);
            ctx.fillRect(x0, area.top, x1 - x0, area.bottom - area.top);
            ctx.strokeStyle = ar(0.25);
            ctx.lineWidth = 1;
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(x0, area.top); ctx.lineTo(x0, area.bottom);
            ctx.moveTo(x1, area.top); ctx.lineTo(x1, area.bottom);
            ctx.stroke();
            const lbl = '\u25C9 OPS WINDOW';
            ctx.font = 'bold 9px "Fira Code"';
            const lw = ctx.measureText(lbl).width;
            const lx = (x0 + x1) / 2;
            const ly = area.top + 18;
            ctx.fillStyle = ar(0.18);
            if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(lx - lw/2 - 6, ly - 6, lw + 12, 14, 3); ctx.fill(); }
            else { ctx.fillRect(lx - lw/2 - 6, ly - 6, lw + 12, 14); }
            ctx.strokeStyle = ar(0.4);
            ctx.lineWidth = 1;
            if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(lx - lw/2 - 6, ly - 6, lw + 12, 14, 3); ctx.stroke(); }
            ctx.fillStyle = ar(0.85);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(lbl, lx, ly + 1);
            ctx.restore();
          }
        }

        // BREACH PROJECTED pins
        const crossings = st.projCrossings || [];
        const dHex = st.dangerHex || '#ef4444';
        if (crossings.length > 0 && y100 >= area.top && y100 <= area.bottom) {
          ctx.save();
          for (const c of crossings) {
            const cx = xScale.getPixelForValue(c.x);
            if (cx < area.left || cx > area.right) continue;
            // Vertical pin
            ctx.strokeStyle = 'rgba(' + rd + ',0.8)';
            ctx.lineWidth = 2;
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(cx, y100 - 12);
            ctx.lineTo(cx, y100 + 12);
            ctx.stroke();
            // Diamond
            ctx.fillStyle = dHex;
            ctx.beginPath();
            ctx.moveTo(cx, y100 - 7);
            ctx.lineTo(cx + 5, y100);
            ctx.lineTo(cx, y100 + 7);
            ctx.lineTo(cx - 5, y100);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.4)';
            ctx.lineWidth = 1;
            ctx.stroke();
            // Inner !
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 8px "Fira Code"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('!', cx, y100);
            // BREACH PROJECTED badge
            const alertText = 'BREACH PROJECTED';
            ctx.font = 'bold 9px "Fira Code"';
            const tw = ctx.measureText(alertText).width;
            const bx = cx - tw / 2 - 8;
            const by = y100 - 30;
            const bw = tw + 16;
            const bh = 16;
            ctx.fillStyle = 'rgba(127,29,29,0.92)';
            if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 3); ctx.fill(); }
            else { ctx.fillRect(bx, by, bw, bh); }
            ctx.strokeStyle = 'rgba(' + rd + ',0.7)';
            ctx.lineWidth = 1;
            if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 3); ctx.stroke(); }
            ctx.fillStyle = '#fca5a5';
            ctx.font = 'bold 9px "Fira Code"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('\u26A0 ' + alertText, cx, by + bh / 2);
          }
          ctx.restore();
        }
      }
    };
    this._overlayPluginRegistered = true;
    return this._overlayPlugin;
  },

  // ══════════════════════════════════════════
  //  RENDER
  // ══════════════════════════════════════════
  render(el, data) {
    if (!data) return;
    this._loadDefaults();

    const COLORS = this._getColors();
    const rd = prepRateLimitData(data);
    if (!rd) return;
    const { now, lu, reset5hr, resetWeekly, start5hr, startWeekly,
      elapsed5hr, remaining5hr, elapsedWeekly, remainingWeekly,
      pct5, pctW, pctS, burn5hr, burnWeekly, ttl5hr, ttlWeekly,
      allPtsEarly, rate5hr, rateWeekly, proj5hr, projWeekly,
      duty, dutyFactor, burnWeeklyActive, remainActiveWk } = rd;

    // Build full point list from limitHistory + live snapshot
    const lh = (data.limitHistory || []).concat([]);
    lh.push({ts: now.toISOString(), pct5hr: pct5, pctWeekly: pctW, pctSonnet: pctS,
      reset5hr: lu.reset5hr || '', resetWeekly: lu.resetWeekly || ''});
    const allPoints = lh.map(h => ({
      ts: new Date(h.ts), pct5hr: h.pct5hr, pctWeekly: h.pctWeekly,
      reset5hr: h.reset5hr || '', resetWeekly: h.resetWeekly || ''
    })).sort((a,b) => a.ts - b.ts);

    // ── Range auto-select on first render ──
    const rangeLookup = {'6h':6*3600000,'24h':24*3600000,'8d':8*24*3600000,'30d':30*24*3600000,'all':Infinity};
    if (!this._limitTimeRange) {
      const dataSpanMs = allPoints.length >= 2 ? allPoints[allPoints.length-1].ts - allPoints[0].ts : 0;
      if (dataSpanMs <= 6*3600000) this._limitTimeRange = '6h';
      else if (dataSpanMs <= 24*3600000) this._limitTimeRange = '24h';
      else if (dataSpanMs <= 8*24*3600000) this._limitTimeRange = '8d';
      else if (dataSpanMs <= 30*24*3600000) this._limitTimeRange = '30d';
      else this._limitTimeRange = 'all';
    }
    const activeRange = this._limitTimeRange;

    // ── Window cycling ──
    let windows = [];
    if (activeRange === '6h') {
      const windowBuckets = new Map();
      for (const p of allPoints) {
        if (!p.reset5hr) continue;
        const bucket = resetBucket(p.reset5hr);
        if (!windowBuckets.has(bucket)) {
          const resetTime = new Date(p.reset5hr);
          windowBuckets.set(bucket, { resetStr: p.reset5hr, resetTime, start: new Date(resetTime.getTime() - WINDOW_5HR_MS), end: resetTime });
        }
      }
      windows = [...windowBuckets.values()].sort((a,b) => a.start - b.start);
    } else if (activeRange === '24h' || activeRange === '8d') {
      const blockMs = activeRange === '8d' ? WINDOW_WEEKLY_MS : 24*3600000;
      if (allPoints.length > 0) {
        const earliest = allPoints[0].ts.getTime();
        let blockEnd = now.getTime();
        while (blockEnd > earliest) {
          windows.unshift({ start: new Date(blockEnd - blockMs), end: new Date(blockEnd) });
          blockEnd -= blockMs;
        }
      }
    }
    const totalWindows = windows.length;

    // Clamp offset
    if (this._windowOffset < -(totalWindows - 1)) this._windowOffset = -(totalWindows - 1);
    if (this._windowOffset > 0) this._windowOffset = 0;

    const selectedWindowIdx = totalWindows - 1 + this._windowOffset;
    const isCurrentWindow = this._windowOffset === 0;
    const selectedWindow = totalWindows > 0 ? windows[Math.max(0, Math.min(selectedWindowIdx, totalWindows - 1))] : null;

    // Update nav UI
    const winLabel = el.querySelector('[data-ref="window-label"]');
    const btnPrev = el.querySelector('[data-ref="btn-prev"]');
    const btnNext = el.querySelector('[data-ref="btn-next"]');
    if (winLabel) winLabel.textContent = isCurrentWindow ? 'CURRENT' : 'Window ' + (selectedWindowIdx + 1) + '/' + totalWindows;
    if (btnPrev) btnPrev.disabled = this._windowOffset <= -(totalWindows - 1) || totalWindows <= 1;
    if (btnNext) btnNext.disabled = this._windowOffset >= 0;

    // ── Range start/end calculation ──
    let rangeStart, rangeEnd;
    if (!isCurrentWindow && selectedWindow) {
      const padMs = activeRange === '6h' ? 5*60000 : activeRange === '24h' ? 30*60000 : 2*3600000;
      rangeStart = new Date(selectedWindow.start.getTime() - padMs);
      rangeEnd = new Date(selectedWindow.end.getTime() + padMs);
    } else {
      if (activeRange === '6h' && reset5hr) {
        const windowStart5hr = new Date(reset5hr.getTime() - WINDOW_5HR_MS);
        rangeStart = new Date(windowStart5hr.getTime() - 30 * 60000);
        rangeEnd = new Date(reset5hr.getTime() + 30 * 60000);
      } else if (activeRange === '8d' && resetWeekly && this._showProjection) {
        const windowStartWeekly = new Date(resetWeekly.getTime() - WINDOW_WEEKLY_MS);
        rangeStart = new Date(windowStartWeekly.getTime() - 12 * 3600000);
        rangeEnd = new Date(resetWeekly.getTime() + 12 * 3600000);
      } else {
        rangeStart = activeRange === 'all' ? new Date(0) : new Date(now.getTime() - rangeLookup[activeRange]);
        rangeEnd = now;
      }
      if (this._showProjection) {
        if (reset5hr && (activeRange === '6h' || activeRange === '24h')) {
          const windowStart5hr = new Date(reset5hr.getTime() - WINDOW_5HR_MS);
          rangeStart = new Date(Math.min(rangeStart.getTime(), windowStart5hr.getTime()));
          rangeEnd = new Date(Math.max(rangeEnd.getTime(), reset5hr.getTime() + 30 * 60000));
        }
        if (resetWeekly && (activeRange === '8d' || activeRange === '30d' || activeRange === 'all')) {
          rangeEnd = new Date(Math.max(rangeEnd.getTime(), resetWeekly.getTime() + 3600000));
        }
      }
    }
    const filtered = allPoints.filter(p => p.ts >= rangeStart && p.ts <= (rangeEnd || now));

    // Highlight active range button
    const ctrlEl = el.querySelector('[data-ref="ctrl"]');
    if (ctrlEl) {
      ctrlEl.querySelectorAll('.tl-btn').forEach(b => {
        if (b.dataset.range) b.classList.toggle('active', b.dataset.range === activeRange);
      });
    }

    // ── Coverage penguin check (30d/all) ──
    const canvas = el.querySelector('[data-ref="canvas"]');
    const penguinEl = el.querySelector('[data-ref="penguin"]');
    const chartWrap = el.querySelector('.limit-chart-wrap');
    if (isCurrentWindow && (activeRange === '30d' || activeRange === 'all')) {
      const rlMinDays = activeRange === 'all' ? 30 : 14;
      const rlStart = now.getTime() - (rlMinDays * 24 * 3600000);
      const inRangeRL = allPoints.filter(p => p.ts.getTime() >= rlStart);
      const rlDistinctDays = new Set(inRangeRL.map(p => p.ts.toISOString().slice(0,10))).size;
      if (rlDistinctDays < rlMinDays) {
        if (chartWrap) chartWrap.style.display = 'none';
        const pct = Math.round(rlDistinctDays / rlMinDays * 100);
        penguinEl.style.height = '255px';
        penguinEl.innerHTML = penguinEmptyState('COLLECTING RATE DATA', rlDistinctDays + ' of ' + rlMinDays + ' days needed for ' + activeRange + ' view (' + pct + '% coverage)');
        return;
      }
    }
    // No penguin — show canvas
    if (chartWrap) chartWrap.style.display = '';
    penguinEl.style.height = '';
    penguinEl.innerHTML = '';

    // ── Session segmentation ──
    const pts5 = this._segmentSeries(filtered, 'pct5hr', 'reset5hr');
    const ptsWk = this._segmentSeries(filtered, 'pctWeekly', 'resetWeekly');

    // ── Dynamic Y-axis ──
    const allVals = pts5.concat(ptsWk).filter(p => p.y !== null).map(p => p.y);
    let dataMax = allVals.length > 0 ? Math.max(...allVals) : 50;
    const dataMin = allVals.length > 0 ? Math.min(...allVals) : 0;
    const yMin = Math.max(0, Math.floor((dataMin * 0.8) / 5) * 5);
    const timeUnit = (activeRange === '6h' || activeRange === '24h') ? 'hour' : 'day';

    // Update projection button
    const projBtn = el.querySelector('[data-ref="btn-proj"]');
    if (projBtn) projBtn.classList.toggle('active', !!this._showProjection);

    // Projection scope
    const show5hr = activeRange === '6h' || activeRange === '24h';
    const showWk = activeRange === '8d' || activeRange === '30d' || activeRange === 'all';

    // ── Build datasets ──
    const datasets = [
      { label: '5hr %', data: pts5, borderColor: COLORS.primary, backgroundColor: COLORS.primary + '18', tension: 0.3, pointRadius: pts5.length > 50 ? 0 : 2, pointHoverRadius: 4, borderWidth: 2, fill: true, spanGaps: false },
      { label: 'Weekly %', data: ptsWk, borderColor: COLORS.secondary, backgroundColor: COLORS.secondary + '18', tension: 0.3, pointRadius: ptsWk.length > 50 ? 0 : 2, pointHoverRadius: 4, borderWidth: 2, fill: true, spanGaps: false },
    ];

    // ── Projection lines ──
    const projCrossings = [];
    if (this._showProjection) {
      const projNow = new Date();
      const projCandidates = [];
      if (show5hr) projCandidates.push([pct5, lu.reset5hr, rate5hr != null ? rate5hr : burn5hr, COLORS.primary, '5hr proj', proj5hr]);
      if (showWk) projCandidates.push([pctW, lu.resetWeekly, 0, COLORS.secondary, 'Wk proj', projWeekly]);
      for (const [pctNow, resetStr, rate, color, label, precomputedProj] of projCandidates) {
        if (!resetStr) continue;
        const resetDt = new Date(resetStr);
        if (resetDt <= projNow) continue;
        const hrsToReset = (resetDt - projNow) / 3600000;
        const projPct = precomputedProj != null ? precomputedProj : Math.round(pctNow + rate * hrsToReset);
        datasets.push({
          label: label + ' (' + projPct + '%)',
          data: [{x: projNow, y: pctNow}, {x: resetDt, y: projPct}],
          borderColor: color + '80',
          backgroundColor: 'transparent',
          borderDash: [6, 4],
          tension: 0,
          pointRadius: [0, 4],
          pointStyle: ['circle', 'triangle'],
          borderWidth: 2,
          fill: false,
          spanGaps: true
        });
        // Crossing 100%
        if (pctNow < 100 && projPct > 100) {
          const frac = (100 - pctNow) / (projPct - pctNow);
          const crossMs = projNow.getTime() + frac * (resetDt.getTime() - projNow.getTime());
          projCrossings.push({ x: crossMs, color: color, label: label, projPct: projPct });
        }
      }
    }

    // yMax
    let projMax = dataMax;
    if (this._showProjection) {
      projMax = Math.max(projMax, Math.min(proj5hr, 120), Math.min(projWeekly, 120));
    }
    const yMax = Math.max(Math.ceil((projMax * 1.1) / 5) * 5, 20);

    // ── Overlay state ──
    const overlayWindow = (!isCurrentWindow && selectedWindow) ? selectedWindow : null;
    const windowStart5hrMs = overlayWindow ? overlayWindow.start.getTime() : (reset5hr ? reset5hr.getTime() - WINDOW_5HR_MS : null);
    const windowEnd5hrMs = overlayWindow ? overlayWindow.end.getTime() : (reset5hr ? reset5hr.getTime() : null);
    const windowStartWeeklyMs = resetWeekly ? resetWeekly.getTime() - WINDOW_WEEKLY_MS : null;
    const windowEndWeeklyMs = resetWeekly ? resetWeekly.getTime() : null;

    this._overlayState = {
      windowStart5hrMs, windowEnd5hrMs, windowStartWeeklyMs, windowEndWeeklyMs,
      showWeekly: showWk, projCrossings, activeRange, accentColor: COLORS.accent,
      rgbDanger: COLORS.rgbDanger, rgbSecondary: COLORS.rgbSecondary,
      dangerHex: COLORS.danger, secondaryHex: COLORS.secondary
    };
    const overlayPlugin = this._ensureOverlayPlugin();

    // ── X-axis bounds ──
    let xMin = rangeStart;
    let xMax = rangeEnd || now;
    if (activeRange === 'all' && filtered.length >= 2) {
      const dStart = new Date(filtered[0].ts);
      const dEnd = new Date(filtered[filtered.length - 1].ts);
      const span = dEnd.getTime() - dStart.getTime();
      const pad = span * 0.1;
      xMin = new Date(dStart.getTime() - pad);
      xMax = new Date(dEnd.getTime() + pad);
    }
    if (isCurrentWindow && this._showProjection) {
      const PADDING_MS = 15 * 60000;
      if (show5hr && reset5hr && reset5hr > now) {
        xMax = new Date(Math.max(xMax.getTime(), reset5hr.getTime() + PADDING_MS));
      }
      if (showWk && resetWeekly && resetWeekly > now) {
        xMax = new Date(Math.max(xMax.getTime(), resetWeekly.getTime() + PADDING_MS));
      }
    }

    // ── Chart.js render ──
    if (this._chart) {
      this._chart.data.datasets = datasets;
      this._chart.options.scales.x.min = xMin;
      this._chart.options.scales.x.max = xMax;
      this._chart.options.scales.x.time.unit = timeUnit;
      this._chart.options.scales.x.time.stepSize = 1;
      this._chart.options.scales.y.min = yMin;
      this._chart.options.scales.y.max = yMax;
      this._chart.update('none');
    } else {
      this._chart = new Chart(canvas, {
        type: 'line',
        data: { datasets },
        plugins: [overlayPlugin],
        options: {
          responsive: true, maintainAspectRatio: false,
          animation: false,
          scales: {
            x: { type: 'time', min: xMin, max: xMax, time: { unit: timeUnit, stepSize: 1, displayFormats: {hour:'HH:mm', day:'MMM d'} }, grid: {color:COLORS.grid}, ticks: {color:COLORS.text2, font:{family:'Fira Code',size:9}, maxTicksLimit: 10} },
            y: { min: yMin, max: yMax, title: {display:true, text:'Usage %', color:COLORS.text2, font:{family:'Fira Code',size:9}}, grid: {color:COLORS.grid}, ticks: {color:COLORS.text2, font:{family:'Fira Code',size:9}, callback: function(v){return v+'%'}} }
          },
          plugins: {
            legend: { labels: {color:COLORS.text, font:{family:'Fira Code',size:10}} },
            tooltip: { callbacks: { label: function(ctx) { return ctx.dataset.label + ': ' + (ctx.parsed.y != null ? ctx.parsed.y + '%' : '--'); } } }
          }
        }
      });
    }

    // ── HEAVY BURN / EXTRA USAGE overlay ──
    const effectiveRate5hr = rate5hr != null ? rate5hr : burn5hr;
    const effectiveRateWeekly = rateWeekly > 0 ? rateWeekly : burnWeekly;
    const heavySession = effectiveRate5hr > 15;
    const heavyWeekly = projWeekly > 100;
    const eu = rd.lu.extra_usage;
    const anyAtLimit = pct5 >= 100 || pctW >= 100;
    const burningExtra = anyAtLimit && eu && eu.is_enabled && (eu.used_credits || 0) > 0;
    const burnOverlay = el.querySelector('[data-ref="burn-overlay"]');
    const burnScope = el.querySelector('[data-ref="burn-scope"]');
    const burnText = el.querySelector('[data-ref="burn-text"]');
    if (burningExtra || heavySession || heavyWeekly) {
      if (burnOverlay) burnOverlay.classList.add('active');
      if (burningExtra) {
        if (burnOverlay) burnOverlay.classList.add('extra');
        if (burnText) burnText.innerHTML = '\u26A0 BURNING EXTRA USAGE';
        const euUsed = eu.used_credits || 0;
        const euLimit = eu.monthly_limit;
        const spendStr = euLimit != null && euLimit > 0
          ? '$' + euUsed.toFixed(2) + ' / $' + euLimit.toFixed(2)
          : '$' + euUsed.toFixed(2) + ' spent';
        if (burnScope) burnScope.textContent = spendStr;
      } else {
        if (burnOverlay) burnOverlay.classList.remove('extra');
        if (burnText) burnText.innerHTML = '\u26A0 HEAVY TOKEN BURN';
        const scope = heavySession && heavyWeekly ? 'SESSION + WEEKLY' : heavySession ? 'SESSION' : 'WEEKLY';
        if (burnScope) burnScope.textContent = scope;
      }
    } else {
      if (burnOverlay) { burnOverlay.classList.remove('active'); burnOverlay.classList.remove('extra'); }
    }

    // ── 3-Column Insight Grid ──
    const insightEl = el.querySelector('[data-ref="insight"]');
    const lhSnaps = data.limitHistory || [];
    const sust5hr = remaining5hr > 0.1 ? (100 - pct5) / remaining5hr : 0;
    const sustWeeklyPerHr = remainActiveWk > 1 ? (100 - pctW) / remainActiveWk : 0;
    const sustDailyWk = sustWeeklyPerHr * duty.activeHrsPerDay;
    const activeBurnWkPerDay = burnWeeklyActive * duty.activeHrsPerDay;

    function paceLabel(actual, sustainable, pctUsed) {
      if (pctUsed >= 100) return { text: 'AT LIMIT', color: 'var(--c-danger)' };
      if (sustainable <= 0) return { text: '--', color: 'var(--text-dim)' };
      const r = (actual / sustainable) * 100;
      if (r <= 85) return { text: 'ON PACE', color: 'var(--c-secondary)' };
      if (r < 100) return { text: 'TIGHT', color: 'var(--c-primary)' };
      return { text: 'OVER LIMIT', color: 'var(--c-danger)' };
    }
    const row = (label, val) => '<div class="intel-row"><span>' + label + '</span><span class="intel-val">' + val + '</span></div>';
    const readout = (text, color) => '<div class="intel-readout" style="color:' + color + '">' + text + '</div>';

    // COL 1: Session
    let col1 = '';
    const p5 = paceLabel(effectiveRate5hr, sust5hr, pct5);
    col1 += readout(p5.text, p5.color);
    if (pct5 >= 100) {
      col1 += row('Status', '<span style="color:var(--c-danger)">Rate limited</span>');
      col1 += row('Used', '<span style="color:var(--c-danger)">' + pct5 + '%</span>');
    } else {
      col1 += row('Rate', '<span style="color:' + projColor(proj5hr) + '">' + effectiveRate5hr.toFixed(1) + '</span> / ' + sust5hr.toFixed(1) + ' %/h');
      col1 += row('Used', pct5 + '%');
    }
    if (reset5hr) {
      const resetLocal = reset5hr.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      col1 += row('Resets', resetLocal + ' <span style="color:var(--text-dim)">(' + remaining5hr.toFixed(1) + 'h left)</span>');
    }

    // COL 2: Weekly
    let col2 = '';
    const pW = paceLabel(burnWeeklyActive, sustWeeklyPerHr, pctW);
    col2 += readout(pW.text, pW.color);
    if (pctW >= 100) {
      col2 += row('Status', '<span style="color:var(--c-danger)">Rate limited</span>');
      col2 += row('Used', '<span style="color:var(--c-danger)">' + pctW + '%</span>');
    } else {
      col2 += row('Rate', '<span style="color:' + projColor(projWeekly) + '">' + activeBurnWkPerDay.toFixed(1) + '</span> / ' + sustDailyWk.toFixed(1) + ' %/day');
      col2 += row('Used', pctW + '%');
    }
    if (resetWeekly) {
      const resetLocal = resetWeekly.toLocaleDateString([], {weekday:'short',month:'short',day:'numeric'});
      col2 += row('Resets', resetLocal + ' <span style="color:var(--text-dim)">(' + (remainingWeekly/24).toFixed(1) + 'd left)</span>');
    }
    if (projWeekly > 0) {
      col2 += row('Proj', '<span style="color:' + projColor(projWeekly) + '">~' + projWeekly + '%</span>');
    }
    if (duty.activeDays >= 2) {
      col2 += row('Duty', duty.activeHrsPerDay.toFixed(1) + 'h/day <span style="color:var(--text-dim)">(' + duty.activeDays + 'd)</span>');
    }
    // Extra usage spend in weekly card
    if (burningExtra) {
      const euUsed = eu.used_credits || 0;
      const euLimit = eu.monthly_limit;
      const euColor = euLimit ? (euUsed/euLimit > 0.8 ? 'var(--c-danger)' : euUsed/euLimit > 0.5 ? 'var(--c-warm)' : 'var(--c-primary)') : 'var(--c-warm)';
      const euVal = euLimit != null && euLimit > 0
        ? '<span style="color:' + euColor + '">$' + euUsed.toFixed(2) + '</span> / $' + euLimit.toFixed(2)
        : '<span style="color:' + euColor + '">$' + euUsed.toFixed(2) + '</span>';
      col2 += row('Extra $', euVal);
    }

    // COL 3: Capacity
    let col3 = '';
    if (data.historyDeduped && data.historyDeduped.length > 0) {
      for (const [wnd, wStart, pctNow, label] of [['5hr', start5hr, pct5, '5hr'], ['weekly', startWeekly, pctW, 'Wk']]) {
        if (!wStart || pctNow <= 0) continue;
        let wt = 0;
        for (const h of data.historyDeduped) {
          if (new Date(h.ts) >= wStart) wt += weightedTokens(h.input, h.cr, h.cw, h.out);
        }
        if (wt > 0) {
          const snapLimit = Math.round(wt / (pctNow/100));
          col3 += row(label, fmtK(Math.round(wt)) + ' / ~' + fmtK(snapLimit));
        }
      }
    }

    // Capacity trend
    const snapsWithData5 = lhSnaps.filter(s => s.wt5hr > 0 && s.pct5hr > 0);
    const snapsWithDataW = lhSnaps.filter(s => s.wtWeekly > 0 && s.pctWeekly > 0);
    function capacityTrend(snaps, pctKey, wtKey, resetKey, label) {
      if (snaps.length < 2) return { html: '', dir: null };
      const ratios = snaps.map(s => ({ ts: s.ts, ratio: Math.round(s[wtKey] / s[pctKey]), pct: s[pctKey], reset: s[resetKey] }));
      const byCycle = {};
      for (const r of ratios) { const key = resetBucket(r.reset); if (!byCycle[key]) byCycle[key] = []; byCycle[key].push(r); }
      const cycles = Object.keys(byCycle).sort();
      if (cycles.length < 2) return { html: '', dir: null };
      const peakOf = arr => arr.reduce((best, r) => r.pct > best.pct ? r : best, arr[0]);
      const firstPeak = peakOf(byCycle[cycles[0]]);
      const lastPeak = peakOf(byCycle[cycles[cycles.length - 1]]);
      if (firstPeak.pct < 15 || lastPeak.pct < 15) return { html: '', dir: null };
      const change = ((lastPeak.ratio - firstPeak.ratio) / firstPeak.ratio * 100).toFixed(0);
      const dir = Math.abs(change) < 25 ? 'stable' : (change > 0 ? 'expanded' : 'contracted');
      const arrow = dir === 'expanded' ? '\u25B2' : dir === 'contracted' ? '\u25BC' : '\u25C6';
      const color = dir === 'expanded' ? 'var(--c-secondary)' : dir === 'contracted' ? 'var(--c-danger)' : 'var(--c-tertiary)';
      const h = row(label + ' trend (' + cycles.length + ' win)', '<span style="color:' + color + '">' + arrow + ' ' + dir + ' ' + (change > 0 ? '+' : '') + change + '%</span>');
      return { html: h, dir, color };
    }
    const trend5 = capacityTrend(snapsWithData5, 'pct5hr', 'wt5hr', 'reset5hr', '5hr');
    col3 += trend5.html;
    let trendW = { html: '', dir: null };
    if (snapsWithDataW.some(s => resetBucket(s.resetWeekly) !== resetBucket(snapsWithDataW[0].resetWeekly))) {
      trendW = capacityTrend(snapsWithDataW, 'pctWeekly', 'wtWeekly', 'resetWeekly', 'Wk');
      col3 += trendW.html;
    }
    const mainTrend = trendW.dir || trend5.dir;
    const trendLabel = mainTrend === 'expanded' ? 'EXPANDING' : mainTrend === 'contracted' ? 'CONTRACTING' : 'STABLE';
    const trendColor = mainTrend === 'expanded' ? 'var(--c-secondary)' : mainTrend === 'contracted' ? 'var(--c-danger)' : 'var(--c-tertiary)';
    col3 = readout(trendLabel, trendColor) + col3;

    // Assemble
    const card = (cls, label, body) => '<div class="intel-card ' + cls + '"><div class="intel-label">' + label + '</div><div class="intel-body">' + (body || '<span style="color:var(--text-dim)">No data</span>') + '</div></div>';
    insightEl.innerHTML =
      '<div class="intel-grid">' +
        card('session', 'Session', col1) +
        card('weekly', 'Weekly', col2) +
        card('capacity', 'Capacity', col3) +
      '</div>' +
      '<div class="intel-ref">Weights: in\u00D71 + cr\u00D70 + cw\u00D71 + out\u00D75 \u00B7 cache reads excluded from ITPM</div>';
  }
});
</script>
