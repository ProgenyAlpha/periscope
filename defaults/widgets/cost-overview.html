<style>
.w-metrics .m-windows{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:900px){.w-metrics .m-windows{grid-template-columns:repeat(2,1fr)}}
.w-metrics .m-win{background:var(--bg-inset);border:1px solid var(--rule);border-radius:var(--radius,6px);padding:7px 8px;position:relative;transition:border-color 0.2s;overflow:hidden}
.w-metrics .m-win:hover{border-color:color-mix(in srgb,var(--rule) 50%,var(--text-dim))}
.w-metrics .m-win::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:1px 0 0 1px}
.w-metrics .m-win.w-1h::before{background:var(--c-tertiary)}
.w-metrics .m-win.w-5h::before{background:var(--c-primary)}
.w-metrics .m-win.w-24h::before{background:var(--c-warm)}
.w-metrics .m-win.w-life::before{background:var(--c-accent)}
.w-metrics .m-win-label{font-size:0.5rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:3px;line-height:1;display:flex;justify-content:space-between;align-items:center}
.w-metrics .m-win-sessions{font-size:0.48rem;color:var(--text-dim);font-family:var(--font-mono);letter-spacing:0}
.w-metrics .m-win-cost{font-size:1.2rem;font-weight:600;font-family:var(--font-mono);color:var(--text-bright);line-height:1.1}
.w-metrics .m-win-tokens{font-size:0.58rem;color:var(--text-dim);font-family:var(--font-mono);margin-top:2px}
.w-metrics .m-win-turns{font-size:0.5rem;color:var(--text-dim);font-family:var(--font-mono);margin-top:1px}

.w-metrics .m-stats{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.w-metrics .m-stat{flex:1;min-width:80px;background:var(--bg-inset);border:1px solid var(--rule);border-radius:var(--radius,6px);padding:4px 8px;display:flex;align-items:center;gap:6px}
.w-metrics .m-stat-icon{font-size:0.65rem;font-family:var(--font-mono);color:var(--text-dim);width:14px;text-align:center;flex-shrink:0}
.w-metrics .m-stat-body{min-width:0}
.w-metrics .m-stat-val{font-size:0.85rem;font-weight:600;font-family:var(--font-mono);color:var(--text-bright);line-height:1}
.w-metrics .m-stat-label{font-size:0.48rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-top:2px}
</style>
<script>
Periscope.registerWidget({
  id: 'cost-overview',
  title: 'Key Metrics',
  size: 'lg',
  priority: 5,

  init(el) {
    el.innerHTML =
      '<div class="widget-title">Key Metrics</div>' +
      '<div class="w-metrics">' +
        '<div class="m-windows">' +
          '<div class="m-win w-1h" id="km-1h"><div class="m-win-label">Last Hour<span class="m-win-sessions" id="km-1h-s"></span></div><div class="m-win-cost" id="km-1h-cost">--</div><div class="m-win-tokens" id="km-1h-tok"></div><div class="m-win-turns" id="km-1h-turns"></div></div>' +
          '<div class="m-win w-5h" id="km-5h"><div class="m-win-label">Last 5 Hours<span class="m-win-sessions" id="km-5h-s"></span></div><div class="m-win-cost" id="km-5h-cost">--</div><div class="m-win-tokens" id="km-5h-tok"></div><div class="m-win-turns" id="km-5h-turns"></div></div>' +
          '<div class="m-win w-24h" id="km-24h"><div class="m-win-label">Last 24 Hours<span class="m-win-sessions" id="km-24h-s"></span></div><div class="m-win-cost" id="km-24h-cost">--</div><div class="m-win-tokens" id="km-24h-tok"></div><div class="m-win-turns" id="km-24h-turns"></div></div>' +
          '<div class="m-win w-life" id="km-life"><div class="m-win-label">Lifetime<span class="m-win-sessions" id="km-life-s"></span></div><div class="m-win-cost" id="km-life-cost">--</div><div class="m-win-tokens" id="km-life-tok"></div><div class="m-win-turns" id="km-life-turns"></div></div>' +
        '</div>' +
        '<div class="m-stats">' +
          '<div class="m-stat" id="km-burn-stat"><span class="m-stat-icon">\u26A1</span><div class="m-stat-body"><div class="m-stat-val" id="km-burn-val">--</div><div class="m-stat-label">Burn Rate</div></div></div>' +
          '<div class="m-stat" id="km-cache-stat"><span class="m-stat-icon">\u21BB</span><div class="m-stat-body"><div class="m-stat-val" id="km-cache-val">--</div><div class="m-stat-label">Cache Hit</div></div></div>' +
          '<div class="m-stat" id="km-avg-stat"><span class="m-stat-icon">\u00F7</span><div class="m-stat-body"><div class="m-stat-val" id="km-avg-val">--</div><div class="m-stat-label">Avg Turn</div></div></div>' +
        '</div>' +
      '</div>';
  },

  render(el, data) {
    var sidecars = data.sidecars || [];
    var history = data.history || [];
    var cs = costSuffix(data);
    var now = Date.now();

    // --- Window cost/token calculator ---
    // History entries are cumulative per session. Delta = max - min within window per sid.
    function windowStats(windowMs) {
      var cutoff = windowMs ? now - windowMs : 0;
      var bySid = {};
      for (var i = 0; i < history.length; i++) {
        var h = history[i];
        var t = new Date(h.ts).getTime();
        if (t < cutoff) continue;
        var sid = h.sid;
        if (!bySid[sid]) bySid[sid] = {
          minCost: h.cost||0, maxCost: h.cost||0,
          minIn: h.input||0, maxIn: h.input||0,
          minCR: h.cr||0, maxCR: h.cr||0,
          minCW: h.cw||0, maxCW: h.cw||0,
          minOut: h.out||0, maxOut: h.out||0,
          minTurns: h.turns||0, maxTurns: h.turns||0,
          first: h.ts, last: h.ts
        };
        var s = bySid[sid];
        var c = h.cost||0;
        if (c < s.minCost) s.minCost = c;
        if (c > s.maxCost) s.maxCost = c;
        var inp = h.input||0; if (inp < s.minIn) s.minIn = inp; if (inp > s.maxIn) s.maxIn = inp;
        var cr = h.cr||0; if (cr < s.minCR) s.minCR = cr; if (cr > s.maxCR) s.maxCR = cr;
        var cw = h.cw||0; if (cw < s.minCW) s.minCW = cw; if (cw > s.maxCW) s.maxCW = cw;
        var out = h.out||0; if (out < s.minOut) s.minOut = out; if (out > s.maxOut) s.maxOut = out;
        var turns = h.turns||0; if (turns < s.minTurns) s.minTurns = turns; if (turns > s.maxTurns) s.maxTurns = turns;
        if (h.ts < s.first) s.first = h.ts;
        if (h.ts > s.last) s.last = h.ts;
      }
      var cost = 0, tokens = 0, turns = 0, sessions = 0;
      var earliest = null, latest = null;
      for (var sid in bySid) {
        var sv = bySid[sid];
        cost += sv.maxCost - sv.minCost;
        tokens += (sv.maxIn - sv.minIn) + (sv.maxCR - sv.minCR) + (sv.maxCW - sv.minCW) + (sv.maxOut - sv.minOut);
        turns += sv.maxTurns - sv.minTurns;
        sessions++;
        if (!earliest || sv.first < earliest) earliest = sv.first;
        if (!latest || sv.last > latest) latest = sv.last;
      }
      var spanHrs = (earliest && latest) ? Math.max((new Date(latest) - new Date(earliest)) / 3600e3, 0.05) : 0;
      return { cost: cost, tokens: tokens, turns: turns, sessions: sessions, spanHrs: spanHrs };
    }

    // --- Lifetime from sidecars (more accurate than history deltas) ---
    var lifeCost = 0, lifeTokens = 0, lifeTurns = 0;
    var lifeCR = 0, lifeIn = 0;
    for (var i = 0; i < sidecars.length; i++) {
      var c = sidecars[i].data && sidecars[i].data.cumulative;
      if (!c) continue;
      lifeCost += c.cost||0;
      lifeTokens += (c.input||0)+(c.cache_read||0)+(c.cache_write||0)+(c.output||0);
      lifeTurns += (c.agent_calls||0)+(c.tool_calls||0)+(c.chat_calls||0);
      lifeCR += c.cache_read||0;
      lifeIn += c.input||0;
    }

    // Reset labels to defaults (in case previously escalated)
    var defaultLabels = {'1h':'Last Hour','5h':'Last 5 Hours','24h':'Last 24 Hours'};
    for (var pfx in defaultLabels) {
      var winEl = el.querySelector('#km-' + pfx);
      if (winEl) { var lbl = winEl.querySelector('.m-win-label'); if (lbl) lbl.childNodes[0].textContent = defaultLabels[pfx]; }
    }

    // --- Compute windows with auto-escalation ---
    // If a window has zero activity, escalate to the next larger window
    var w1h = windowStats(3600e3);
    var w5h = windowStats(5*3600e3);
    var w24h = windowStats(24*3600e3);
    var w7d = windowStats(7*24*3600e3);

    // Auto-escalate: pick the smallest non-empty window for each slot
    function escalate(preferred, fallbacks, labels) {
      if (preferred.data.sessions > 0) return preferred;
      for (var i = 0; i < fallbacks.length; i++) {
        if (fallbacks[i].data.sessions > 0) {
          // Update the label to show escalated window
          var el2 = document.querySelector('#km-' + preferred.pfx);
          if (el2) {
            var lbl = el2.querySelector('.m-win-label');
            if (lbl) lbl.childNodes[0].textContent = labels[i] + ' ';
          }
          return { pfx: preferred.pfx, data: fallbacks[i].data };
        }
      }
      return preferred;
    }

    var slot1 = escalate(
      { pfx: '1h', data: w1h },
      [{ data: w5h }, { data: w24h }],
      ['Last 5 Hours', 'Last 24 Hours']
    );
    var slot2 = escalate(
      { pfx: '5h', data: w5h },
      [{ data: w24h }, { data: w7d }],
      ['Last 24 Hours', 'Last 7 Days']
    );
    var slot3 = escalate(
      { pfx: '24h', data: w24h },
      [{ data: w7d }],
      ['Last 7 Days']
    );

    // --- Render window cards ---
    var windows = [
      slot1,
      slot2,
      slot3,
      { pfx: 'life', data: { cost: lifeCost, tokens: lifeTokens, turns: lifeTurns, sessions: sidecars.length } }
    ];

    for (var j = 0; j < windows.length; j++) {
      var w = windows[j];
      var d = w.data;
      var costEl = el.querySelector('#km-' + w.pfx + '-cost');
      costEl.textContent = fmtCost(d.cost) + cs;
      // Color cost based on magnitude
      if (d.cost > 50) costEl.style.color = 'var(--c-danger)';
      else if (d.cost > 10) costEl.style.color = 'var(--c-warm)';
      else if (d.cost > 0) costEl.style.color = 'var(--text-bright)';
      else costEl.style.color = 'var(--text-dim)';

      el.querySelector('#km-' + w.pfx + '-tok').textContent = fmtK(d.tokens) + ' tokens';
      el.querySelector('#km-' + w.pfx + '-turns').textContent = d.turns + ' turns';
      el.querySelector('#km-' + w.pfx + '-s').textContent = d.sessions + ' sess';
    }

    // --- Burn rate (best available window) ---
    var burnVal = el.querySelector('#km-burn-val');
    var burnSrc = w5h.spanHrs > 0.05 && w5h.cost > 0 ? w5h : w24h.spanHrs > 0.05 && w24h.cost > 0 ? w24h : w7d;
    if (burnSrc.spanHrs > 0.05 && burnSrc.cost > 0) {
      var rate = burnSrc.cost / burnSrc.spanHrs;
      burnVal.textContent = '$' + rate.toFixed(2) + '/hr' + cs;
      burnVal.style.color = rate > 15 ? 'var(--c-danger)' : rate > 5 ? 'var(--c-warm)' : '';
    } else {
      burnVal.textContent = '--';
      burnVal.style.color = '';
    }

    // --- Cache hit ---
    var cacheRate = cacheHitRate(lifeIn, lifeCR);
    el.querySelector('#km-cache-val').textContent = fmtCacheRate(cacheRate) + '%';

    // --- Avg turn cost ---
    var avgCost = lifeTurns > 0 ? lifeCost / lifeTurns : 0;
    el.querySelector('#km-avg-val').textContent = avgCost > 0 ? '$' + avgCost.toFixed(4) + cs : '--';
  }
});
</script>
